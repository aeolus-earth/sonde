name: CI

on:
  push:
    branches:
      - "main"
    paths: &paths
      - ".github/workflows/CI.yml"
      - "ext/**"
      - "src/**"
      - "test/**"
      - "Project.toml"
  pull_request:
    paths: *paths
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: always.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read

env:
  # Don't make Reactant occupy all the GPU memory
  XLA_REACTANT_GPU_PREALLOCATE: 'false'
  JULIA_PKG_SERVER_REGISTRY_PREFERENCE: 'eager'

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - check-bounds ${{ matrix.check-bounds }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    container:
      image: ${{ (startsWith(matrix.os, 'aws-linux-nvidia-gpu-') && format('ghcr.io/numericalearth/breeze-docker-images:test-julia_{0}', matrix.version) ) || '' }}
      options: --gpus=all
    strategy:
      fail-fast: false
      matrix:
        version:
          - "min"
          - "1.12.5"
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        arch:
          - "default"
        check-bounds:
          - "yes"
        exclude:
          - version: "min"
            os: windows-latest
        include:
          # `--check-bounds=auto` is necessary for testing Reactant workloads
          # until https://github.com/EnzymeAD/Reactant.jl/issues/2347 is fixed.
          - version: "1.12.5"
            os: aws-linux-nvidia-gpu-l4
            arch: "default"
            check-bounds: "auto"
          - version: "1.11.9"
            os: aws-linux-nvidia-gpu-l4-4xl
            arch: "default"
            check-bounds: "auto"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2.7.0
        # On the self-hosted GPU runners we use a Docker image with Julia pre-installed.
        if: ${{ ! startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - name: Show versioninfo
        if: ${{ startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
        run: |
          julia --compile=min -O0 -e 'using InteractiveUtils; versioninfo()'
      - uses: julia-actions/cache@e97f6fc1a6e21c82253c85e269be7340376aa425 # v3.0.1
        with:
          # On self-hosted runners we use the prebuilt Docker container, which already
          # caches pkgimages and such, so we don't need to cache here most things.  Only
          # useful thing is the scratchspaces, in particular ParallelTestRunner's to make
          # scheduling of test jobs more efficients.
          cache-artifacts: ${{ ! startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
          cache-packages: ${{ ! startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
          cache-registries: ${{ ! startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
          cache-compiled: ${{ ! startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
          cache-scratchspaces: true
          cache-logs: ${{ ! startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
      - name: "Set test arguments and other environment variables"
        shell: bash
        run: |
          # Run tests in verbose mode
          TEST_ARGS=(--verbose)

          if [[ ${{ matrix.os }} == *linux-nvidia-gpu* ]]; then
              # When running the tests on a GPU node we always want to make sure
              # CUDA is functional.
              echo "BREEZE_ENSURE_CUDA_FUNCTIONAL=true" >> "${GITHUB_ENV}"
              # On the GPU runners we sometimes run out-of-memory because we have several
              # concurrent jobs, some of them reaching a large memory usage.  We reduce the
              # number of jobs to avoid memory issues.
              TEST_ARGS+=(--jobs=$(($(nproc) - 1)))
          fi

          if [[ ${{ runner.os }} == "macOS" ]]; then
              # Encourage ParallelTestRunner to use multiple jobs on macOS, rather
              # than the single one it'd use by default.
              TEST_ARGS+=(--jobs=3)
              # ...but also set a more conservative limit to memory usage before
              # reciclying a worker, to avoid out-of-memory issues.
              JULIA_TEST_MAXRSS_MB=2500
              echo "JULIA_TEST_MAXRSS_MB=${JULIA_TEST_MAXRSS_MB}" | tee -a "${GITHUB_ENV}"
          fi
          echo "runtest_test_args=${TEST_ARGS[@]}" | tee -a "${GITHUB_ENV}"
      - name: Install earlyoom
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          sudo apt-get install -y earlyoom
      - name: Prepare test environment
        if: ${{ startsWith(matrix.os, 'aws-linux-nvidia-gpu-') }}
        shell: bash
        run: |
          # Running doctests need to run `git` commands in this directory, but `git`
          # complains about dubious ownership when using the Docker image.
          git config --global --add safe.directory ${PWD}

          # Little complication: we built the Docker images on a non-GPU system and so we
          # had to use a `LocalPreferences.toml` file to force the CUDA runtime, but this
          # means that we have to use the same preferences also for the tests environment,
          # because running the tests clears up the load path.  Let's copy the global
          # preference file to test directory (the global one will be ignored during the
          # tests).
          cp -v /usr/local/share/julia/environments/breeze/LocalPreferences.toml test/.
      - name: Run tests
        shell: bash
        run: |
          if [[ ${{ runner.os }} == 'Linux' ]]; then
              # We use earlyoom only on the Linux machines
              earlyoom -m 3 -s 100 -r 300 --prefer 'julia' &
          fi
          julia --project --color=yes --check-bounds=${{ matrix.check-bounds }} -e 'using Pkg; Pkg.test(; coverage=true, julia_args=["--check-bounds=${{ matrix.check-bounds }}", "--compiled-modules=yes", "--depwarn=yes", "-O0"], test_args=`${{ env.runtest_test_args }}`, force_latest_compatible_version=false, allow_reresolve=true)'
      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38 # v1.2.2
      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true
