name: Whitespace

permissions: {}

on:
  push:
    branches:
      - 'main'
    paths: &paths
      - '.github/workflows/Whitespace.yml'
      - '**.jl'
      - '**.md'
      - '**.sh'
  pull_request:
    paths: *paths

jobs:
  whitespace:
    name: Check whitespace
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      - name: Checkout the NumericalEarth/Breeze.jl repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Checkout the JuliaLang/julia repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: 'JuliaLang/julia'
          # Clone Julia in a subdir.
          path: '.julia'
          # Check out a fixed revision to avoid surprises in case the script is
          # changed in the future.
          ref: '3b12a882e887753e4d2e9e9db65d99d3f7d9e26b'
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2.7.0
        with:
          version: '1.12.4'
      - name: Check whitespace
        run: |
          .julia/contrib/check-whitespace.jl
