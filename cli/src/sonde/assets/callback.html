<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed in to Sonde</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FBF7F4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 400px;
        }

        .wordmark {
            width: 180px;
            height: auto;
            color: #1a1a1a;
            margin-bottom: 3rem;
        }

        .wave {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            color: #E07B39;
            font-size: 0.75rem;
            line-height: 1.4;
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
            white-space: pre;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .status svg {
            width: 18px;
            height: 18px;
            color: #4ADE80;
        }

        .status span {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a1a1a;
        }

        p {
            font-size: 0.85rem;
            color: #6B7280;
            line-height: 1.5;
        }

        .fade-hint {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #9CA3AF;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wordmark">
            {{WORDMARK_SVG}}
        </div>
        <div class="wave">&#9472;&#9472;&#9472;&#9472;&#9472;&#9582;    &#9581;&#9472;&#9472;&#9472;&#9472;&#9582;    &#9581;&#9472;&#9472;&#9472;&#9472;&#9582;    &#9581;&#9472;&#9472;&#9472;&#9472;&#9472;
        &#9474;    &#9474;    &#9474;    &#9474;    &#9474;    &#9474;
        &#9584;&#9472;&#9472;&#9472;&#9472;&#9583;    &#9584;&#9472;&#9472;&#9472;&#9472;&#9583;    &#9584;&#9472;&#9472;&#9472;&#9472;&#9583;</div>
        <div class="status">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
            <span>Signed in</span>
        </div>
        <p>You can close this tab and return to your terminal.</p>
        <p class="fade-hint">This page will close automatically.</p>
    </div>
    <script>setTimeout(function() { window.close(); }, 3000);</script>
</body>
</html>
