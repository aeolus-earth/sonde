<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in complete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FBF7F4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 3rem 3.5rem;
            max-width: 420px;
        }

        .wordmark {
            width: 160px;
            height: auto;
            color: #1a1a1a;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: #E07B39;
            margin: 0 auto 2rem;
            border-radius: 1px;
        }

        .success-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ECFDF5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            animation: fadeScale 0.4s ease-out;
        }

        .success-icon svg {
            width: 24px;
            height: 24px;
            color: #16A34A;
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 0.875rem;
            color: #6B7280;
            line-height: 1.6;
        }

        .fade-hint {
            margin-top: 1.75rem;
            font-size: 0.75rem;
            color: #9CA3AF;
        }

        .progress {
            width: 100%;
            height: 2px;
            background: #E5E7EB;
            border-radius: 1px;
            margin-top: 2rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #E07B39;
            border-radius: 1px;
            animation: shrink 3s linear forwards;
        }

        @keyframes shrink {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wordmark">
            {{WORDMARK_SVG}}
        </div>
        <div class="divider"></div>
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>
        <h1>Sign-in complete</h1>
        <p>Return to your terminal to keep going in Sonde.</p>
        <p class="fade-hint">This tab will close automatically&hellip;</p>
        <div class="progress"><div class="progress-bar"></div></div>
    </div>
    <script>setTimeout(function() { window.close(); }, 3000);</script>
</body>
</html>
