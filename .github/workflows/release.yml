name: Release

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes (leave blank for auto-generated changelog)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for changelog generation

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Get current version
        id: version
        run: |
          VERSION=$(python -c "
          import re
          text = open('cli/src/sonde/__init__.py').read()
          print(re.search(r'__version__ = \"(.+)\"', text)[1])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Check tag exists
        run: |
          if ! git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "WARNING: Tag v${{ steps.version.outputs.version }} does not exist."
            echo "Creating tag now..."
            git tag "v${{ steps.version.outputs.version }}"
            git push --tags
          fi

      - name: Build release artifacts
        working-directory: cli
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          rm -rf dist-release
          uv build --out-dir dist-release
          cp "dist-release/sonde-${VERSION}-py3-none-any.whl" dist-release/sonde-latest-py3-none-any.whl
          cp "dist-release/sonde-${VERSION}.tar.gz" dist-release/sonde-latest.tar.gz

      - name: Verify wheel install
        working-directory: cli
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          rm -rf /tmp/sonde-release-help.txt /tmp/sonde-xdg-data /tmp/sonde-xdg-bin
          XDG_DATA_HOME=/tmp/sonde-xdg-data \
          XDG_BIN_HOME=/tmp/sonde-xdg-bin \
          uv tool install \
            --force \
            --python 3.12 \
            "dist-release/sonde-${VERSION}-py3-none-any.whl"
          /tmp/sonde-xdg-bin/sonde --help >/tmp/sonde-release-help.txt
          test -s /tmp/sonde-release-help.txt

      - name: Generate changelog from commits
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -v "v${{ steps.version.outputs.version }}" | head -1)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..v${{ steps.version.outputs.version }}"
            echo "Changelog range: $RANGE"
          else
            RANGE="v${{ steps.version.outputs.version }}"
            echo "No previous tag — using last 30 commits"
          fi

          {
            echo "log<<EOF"
            if [ -n "$LAST_TAG" ]; then
              git log "$RANGE" --oneline --no-merges | head -50
            else
              git log --oneline -30 --no-merges
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "v${VERSION}" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..v${VERSION}" --oneline --no-merges)
          else
            CHANGES=$(git log --oneline -20 --no-merges)
          fi

          ENTRY="## v${VERSION} ($(date +%Y-%m-%d))\n\n$(echo "$CHANGES" | sed 's/^/- /')\n"

          if [ -f CHANGELOG.md ]; then
            echo -e "${ENTRY}\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for v${VERSION} [skip-bump]" || true
          git push || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Sonde v${{ steps.version.outputs.version }}
          body: |
            ## Sonde v${{ steps.version.outputs.version }}

            ### Install
            ```bash
            uv tool install --force "git+https://github.com/${{ github.repository }}.git@main#subdirectory=cli"
            ```

            ### Changes
            ${{ inputs.notes || steps.changelog.outputs.log }}
          files: |
            cli/dist-release/sonde-${{ steps.version.outputs.version }}-py3-none-any.whl
            cli/dist-release/sonde-${{ steps.version.outputs.version }}.tar.gz
            cli/dist-release/sonde-latest-py3-none-any.whl
            cli/dist-release/sonde-latest.tar.gz
          draft: false
          prerelease: false
