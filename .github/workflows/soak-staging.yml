name: Staging Soak

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Concurrent chat sessions"
        required: false
        type: string
        default: "10"
      rounds:
        description: "Rounds per worker"
        required: false
        type: string
        default: "2"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    environment: staging
    env:
      HOSTED_UI_URL: ${{ vars.SONDE_STAGING_UI_URL || vars.SONDE_UI_URL || '' }}
      HOSTED_AGENT_URL: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE || vars.SONDE_AGENT_HTTP_BASE || '' }}
      HOSTED_SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_STAGING_PROJECT_REF || vars.SUPABASE_PROJECT_REF || '' }}
      HOSTED_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_STAGING_ANON_KEY || vars.SUPABASE_ANON_KEY || '' }}
      HOSTED_SMOKE_USER_EMAIL: ${{ secrets.SONDE_STAGING_SMOKE_USER_EMAIL || secrets.SONDE_SMOKE_USER_EMAIL || '' }}
      HOSTED_SMOKE_USER_PASSWORD: ${{ secrets.SONDE_STAGING_SMOKE_USER_PASSWORD || secrets.SONDE_SMOKE_USER_PASSWORD || '' }}
      HOSTED_CLI_AUDIT_TOKEN: ${{ secrets.SONDE_STAGING_CLI_AUDIT_TOKEN || secrets.SONDE_CLI_AUDIT_TOKEN || '' }}
      HOSTED_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_STAGING_AGENT_RUNTIME_AUDIT_TOKEN || secrets.SONDE_AGENT_RUNTIME_AUDIT_TOKEN || '' }}
      HOSTED_REDIS_URL: ${{ vars.SONDE_STAGING_UPSTASH_REDIS_REST_URL || vars.SONDE_UPSTASH_REDIS_REST_URL || '' }}
      HOSTED_REDIS_TOKEN: ${{ secrets.SONDE_STAGING_UPSTASH_REDIS_REST_TOKEN || secrets.SONDE_UPSTASH_REDIS_REST_TOKEN || '' }}
      HOSTED_REQUIRE_SHARED_RATE_LIMIT: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT || '' }}
      HOSTED_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID || '' }}
      HOSTED_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET || '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Load hosted staging contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: staging
          ui-url: ${{ env.HOSTED_UI_URL }}
          agent-url: ${{ env.HOSTED_AGENT_URL }}
          supabase-project-ref: ${{ env.HOSTED_SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ env.HOSTED_SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ env.HOSTED_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ env.HOSTED_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ env.HOSTED_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ env.HOSTED_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ env.HOSTED_REDIS_URL }}
          redis-token: ${{ env.HOSTED_REDIS_TOKEN }}
          require-shared-rate-limit: ${{ env.HOSTED_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ env.HOSTED_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ env.HOSTED_GOOGLE_CLIENT_SECRET }}

      - name: Set soak temp paths
        run: |
          echo "SOAK_SESSION_FILE=$RUNNER_TEMP/sonde-soak-sessions.json" >> "$GITHUB_ENV"
          echo "SOAK_USERS_FILE=$RUNNER_TEMP/sonde-soak-users.json" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Resolve soak settings
        id: soak
        env:
          DEFAULT_CONCURRENCY: "10"
          DEFAULT_ROUNDS: "2"
        run: |
          RAW_CONCURRENCY="$(jq -r '.inputs.concurrency // empty' "$GITHUB_EVENT_PATH")"
          RAW_ROUNDS="$(jq -r '.inputs.rounds // empty' "$GITHUB_EVENT_PATH")"
          CONCURRENCY="${RAW_CONCURRENCY:-$DEFAULT_CONCURRENCY}"
          ROUNDS="${RAW_ROUNDS:-$DEFAULT_ROUNDS}"
          echo "concurrency=$CONCURRENCY" >> "$GITHUB_OUTPUT"
          echo "rounds=$ROUNDS" >> "$GITHUB_OUTPUT"
          echo "Running soak with concurrency=$CONCURRENCY rounds=$ROUNDS"

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Wait for staging agent
        run: |
          AGENT="${{ env.HOSTED_AGENT_URL }}"
          if [ -z "$AGENT" ]; then
            echo "::error::No staging agent URL is configured"
            exit 1
          fi
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENT/health" >/dev/null; then
              echo "Staging agent is reachable"
              exit 0
            fi
            echo "Waiting for staging agent ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging agent did not become reachable in time"
          exit 1

      - name: Provision staging soak sessions
        working-directory: server
        env:
          SUPABASE_URL: https://${{ env.HOSTED_SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ env.HOSTED_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
          SMOKE_USER_COUNT: ${{ steps.soak.outputs.concurrency }}
          SMOKE_USER_PREFIX: sonde-staging-soak
          SMOKE_USER_PROGRAMS: shared,weather-intervention,cc,dir
          SMOKE_USER_ROLE: member
          SMOKE_SESSION_FILE: ${{ env.SOAK_SESSION_FILE }}
          SMOKE_USERS_FILE: ${{ env.SOAK_USERS_FILE }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_STAGING_SERVICE_ROLE_KEY is required for staging soak sessions"
            exit 1
          fi
          node scripts/provision-smoke-sessions.mjs >/dev/null

      - name: Timeline concurrency smoke
        env:
          AGENT_BASE: ${{ env.HOSTED_AGENT_URL }}
          SOAK_SESSION_FILE: ${{ env.SOAK_SESSION_FILE }}
        run: |
          ACCESS_TOKEN="$(node -e 'const fs=require(\"node:fs\"); const file=process.env.SOAK_SESSION_FILE; const data=JSON.parse(fs.readFileSync(file,\"utf8\")); process.stdout.write((data.access_tokens?.[0] ?? \"\").trim());')"
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::No soak access token available"
            exit 1
          fi
          for idx in $(seq 1 5); do
            curl -fsS \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$AGENT_BASE/github/repos/aeolus-earth/sonde/commits?per_page=25" >"/tmp/timeline-$idx.json" &
          done
          wait

      - name: Run staging chat soak
        working-directory: server
        env:
          SOAK_CHAT_HTTP_BASE: ${{ env.HOSTED_AGENT_URL }}
          SOAK_SESSION_FILE: ${{ env.SOAK_SESSION_FILE }}
          SOAK_CHAT_CONCURRENCY: ${{ steps.soak.outputs.concurrency }}
          SOAK_CHAT_ROUNDS: ${{ steps.soak.outputs.rounds }}
          SOAK_CHAT_PROMPT: "Use Sonde tools to list one accessible program id and briefly explain what you found."
          SOAK_CHAT_REQUIRE_TOOL_USE: "1"
        run: |
          SOAK_CHAT_TOKENS="$(node -e 'const fs=require(\"node:fs\"); const file=process.env.SOAK_SESSION_FILE; const data=JSON.parse(fs.readFileSync(file,\"utf8\")); process.stdout.write((data.access_tokens ?? []).join(\",\"));')"
          export SOAK_CHAT_TOKENS
          if [ -z "$SOAK_CHAT_TOKENS" ]; then
            echo "::error::No soak chat tokens available"
            exit 1
          fi
          node scripts/soak-chat.mjs

      - name: Cleanup staging soak users
        if: always()
        working-directory: server
        env:
          SUPABASE_URL: https://${{ env.HOSTED_SUPABASE_PROJECT_REF }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
          SMOKE_USERS_FILE: ${{ env.SOAK_USERS_FILE }}
        run: |
          if [ ! -f "$SMOKE_USERS_FILE" ]; then
            echo "::notice::No soak user file found; skipping cleanup"
            exit 0
          fi
          node scripts/cleanup-smoke-users.mjs
