name: Staging Soak

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Concurrent chat sessions"
        required: false
        type: string
        default: "10"
      rounds:
        description: "Rounds per worker"
        required: false
        type: string
        default: "2"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Wait for staging agent
        run: |
          AGENT="${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}"
          if [ -z "$AGENT" ]; then
            echo "::error::SONDE_STAGING_AGENT_HTTP_BASE is not configured"
            exit 1
          fi
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENT/health" >/dev/null; then
              echo "Staging agent is reachable"
              exit 0
            fi
            echo "Waiting for staging agent ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging agent did not become reachable in time"
          exit 1

      - name: Mint primary staging smoke session
        id: primary
        working-directory: server
        env:
          SUPABASE_URL: https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_STAGING_ANON_KEY }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_STAGING_SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_STAGING_SMOKE_USER_PASSWORD }}
        run: node scripts/mint-smoke-session.mjs >/dev/null

      - name: Mint secondary staging smoke session
        id: secondary
        if: ${{ secrets.SONDE_STAGING_SMOKE_USER2_EMAIL != '' && secrets.SONDE_STAGING_SMOKE_USER2_PASSWORD != '' }}
        working-directory: server
        env:
          SUPABASE_URL: https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_STAGING_ANON_KEY }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_STAGING_SMOKE_USER2_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_STAGING_SMOKE_USER2_PASSWORD }}
        run: node scripts/mint-smoke-session.mjs >/dev/null

      - name: Timeline concurrency smoke
        env:
          AGENT_BASE: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          ACCESS_TOKEN: ${{ steps.primary.outputs.access_token }}
        run: |
          for idx in $(seq 1 5); do
            curl -fsS \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$AGENT_BASE/github/repos/aeolus-earth/sonde/commits?per_page=25" >/tmp/timeline-$idx.json &
          done
          wait

      - name: Run staging chat soak
        working-directory: server
        env:
          SOAK_CHAT_HTTP_BASE: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          SOAK_CHAT_TOKENS: ${{ steps.primary.outputs.access_token }}${{ steps.secondary.outputs.access_token != '' && format(',{0}', steps.secondary.outputs.access_token) || '' }}
          SOAK_CHAT_CONCURRENCY: ${{ inputs.concurrency || '10' }}
          SOAK_CHAT_ROUNDS: ${{ inputs.rounds || '2' }}
          SOAK_CHAT_PROMPT: "Use Sonde tools to list one accessible program id, then reply with SONDE_SMOKE_OK."
          SOAK_CHAT_EXPECT_SUBSTRING: SONDE_SMOKE_OK
          SOAK_CHAT_REQUIRE_TOOL_USE: "1"
        run: node scripts/soak-chat.mjs
