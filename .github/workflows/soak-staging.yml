name: Staging Soak

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Concurrent chat sessions"
        required: false
        type: string
        default: "10"
      rounds:
        description: "Rounds per worker"
        required: false
        type: string
        default: "2"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    env:
      SOAK_CONCURRENCY: ${{ github.event.inputs.concurrency || '10' }}
      SOAK_ROUNDS: ${{ github.event.inputs.rounds || '2' }}
      SOAK_SESSION_FILE: ${{ runner.temp }}/sonde-soak-sessions.json
      SOAK_USERS_FILE: ${{ runner.temp }}/sonde-soak-users.json

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Wait for staging agent
        run: |
          AGENT="${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}"
          if [ -z "$AGENT" ]; then
            echo "::error::SONDE_STAGING_AGENT_HTTP_BASE is not configured"
            exit 1
          fi
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENT/health" >/dev/null; then
              echo "Staging agent is reachable"
              exit 0
            fi
            echo "Waiting for staging agent ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging agent did not become reachable in time"
          exit 1

      - name: Provision staging soak sessions
        working-directory: server
        env:
          SUPABASE_URL: https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_STAGING_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
          SMOKE_USER_COUNT: ${{ env.SOAK_CONCURRENCY }}
          SMOKE_USER_PREFIX: sonde-staging-soak
          SMOKE_USER_PROGRAMS: shared,weather-intervention,cc,dir
          SMOKE_USER_ROLE: member
          SMOKE_SESSION_FILE: ${{ env.SOAK_SESSION_FILE }}
          SMOKE_USERS_FILE: ${{ env.SOAK_USERS_FILE }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_STAGING_SERVICE_ROLE_KEY is required for staging soak sessions"
            exit 1
          fi
          node scripts/provision-smoke-sessions.mjs >/dev/null

      - name: Timeline concurrency smoke
        env:
          AGENT_BASE: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          SOAK_SESSION_FILE: ${{ env.SOAK_SESSION_FILE }}
        run: |
          ACCESS_TOKEN="$(node -e 'const fs=require(\"node:fs\"); const file=process.env.SOAK_SESSION_FILE; const data=JSON.parse(fs.readFileSync(file,\"utf8\")); process.stdout.write((data.access_tokens?.[0] ?? \"\").trim());')"
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::No soak access token available"
            exit 1
          fi
          for idx in $(seq 1 5); do
            curl -fsS \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "$AGENT_BASE/github/repos/aeolus-earth/sonde/commits?per_page=25" >/tmp/timeline-$idx.json &
          done
          wait

      - name: Run staging chat soak
        working-directory: server
        env:
          SOAK_CHAT_HTTP_BASE: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          SOAK_SESSION_FILE: ${{ env.SOAK_SESSION_FILE }}
          SOAK_CHAT_CONCURRENCY: ${{ env.SOAK_CONCURRENCY }}
          SOAK_CHAT_ROUNDS: ${{ env.SOAK_ROUNDS }}
          SOAK_CHAT_PROMPT: "Use Sonde tools to list one accessible program id and briefly explain what you found."
          SOAK_CHAT_REQUIRE_TOOL_USE: "1"
        run: |
          export SOAK_CHAT_TOKENS="$(node -e 'const fs=require(\"node:fs\"); const file=process.env.SOAK_SESSION_FILE; const data=JSON.parse(fs.readFileSync(file,\"utf8\")); process.stdout.write((data.access_tokens ?? []).join(\",\"));')"
          if [ -z "$SOAK_CHAT_TOKENS" ]; then
            echo "::error::No soak chat tokens available"
            exit 1
          fi
          node scripts/soak-chat.mjs

      - name: Cleanup staging soak users
        if: always()
        working-directory: server
        env:
          SUPABASE_URL: https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_STAGING_SERVICE_ROLE_KEY }}
          SMOKE_USERS_FILE: ${{ env.SOAK_USERS_FILE }}
        run: |
          if [ ! -f "$SMOKE_USERS_FILE" ]; then
            echo "::notice::No soak user file found; skipping cleanup"
            exit 0
          fi
          node scripts/cleanup-smoke-users.mjs
