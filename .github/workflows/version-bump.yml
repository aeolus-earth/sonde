name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump to apply"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bump version
        id: version
        run: |
          NEW=$(python cli/scripts/bump_version.py ${{ inputs.bump_type }})
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW"

      - name: Commit bump on a branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="version-bump/v${VERSION}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/src/sonde/__init__.py
          git commit -m "chore: bump version to v${VERSION} [skip-bump]"
          git push origin "$BRANCH"
          echo "Created branch $BRANCH"
