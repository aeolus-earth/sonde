name: Production Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to test (leave blank for production default)"
        required: false
        type: string
      agent_url:
        description: "Agent base URL to smoke (leave blank for URL/agent)"
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v6

      - name: Set smoke temp paths
        run: |
          echo "PRODUCTION_SMOKE_SESSION_FILE=$RUNNER_TEMP/sonde-production-smoke-session.json" >> "$GITHUB_ENV"
          echo "PRODUCTION_ACTIVATION_SESSION_FILE=$RUNNER_TEMP/sonde-production-activation-session.json" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - name: Load hosted production contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: production
          validation-profile: smoke
          ui-url: ${{ vars.SONDE_UI_URL }}
          agent-url: ${{ vars.SONDE_AGENT_HTTP_BASE }}
          supabase-project-ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ vars.SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ vars.SONDE_PRODUCTION_UPSTASH_REDIS_REST_URL }}
          redis-token: ${{ secrets.SONDE_PRODUCTION_UPSTASH_REDIS_REST_TOKEN }}
          require-shared-rate-limit: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium firefox --with-deps

      - name: Resolve target URL
        id: targets
        env:
          DEFAULT_UI_URL: ${{ steps.contract.outputs.ui_url }}
          DEFAULT_AGENT_URL: ${{ steps.contract.outputs.agent_url }}
        run: |
          RAW_URL="$(jq -r '.inputs.url // empty' "$GITHUB_EVENT_PATH")"
          RAW_AGENT_URL="$(jq -r '.inputs.agent_url // empty' "$GITHUB_EVENT_PATH")"
          UI_URL="${RAW_URL:-$DEFAULT_UI_URL}"
          AGENT_URL="${RAW_AGENT_URL:-$DEFAULT_AGENT_URL}"
          if [ -z "$UI_URL" ]; then
            echo "::error::No URL to test. Set SONDE_UI_URL for the production environment or pass a URL via workflow dispatch."
            exit 1
          fi
          echo "ui_url=$UI_URL" >> "$GITHUB_OUTPUT"
          echo "agent_url=$AGENT_URL" >> "$GITHUB_OUTPUT"
          echo "Smoke testing UI: $UI_URL"
          if [ -n "$AGENT_URL" ]; then
            echo "Smoke testing agent: $AGENT_URL"
          fi

      - name: Resolve expected production schema version
        id: schema
        run: |
          VERSION="$(node - <<'NODE'
          const fs = require("node:fs");
          const text = fs.readFileSync("../cli/src/sonde/db/compat.py", "utf8");
          const match = text.match(/MINIMUM_SCHEMA_VERSION = (\d+)/);
          if (!match) {
            console.error("Could not determine MINIMUM_SCHEMA_VERSION from cli/src/sonde/db/compat.py");
            process.exit(1);
          }
          process.stdout.write(match[1]);
          NODE
          )"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for production UI
        run: |
          URL="${{ steps.targets.outputs.ui_url }}"
          for attempt in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Production UI is reachable ($STATUS)"
              exit 0
            fi
            echo "Waiting for production UI ($attempt/60)..."
            sleep 10
          done
          echo "::error::Production UI did not become reachable in time"
          exit 1

      - name: Wait for production agent
        if: ${{ steps.targets.outputs.agent_url != '' }}
        run: |
          AGENT="${{ steps.targets.outputs.agent_url }}"
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENT/health" >/dev/null; then
              echo "Production agent is reachable"
              exit 0
            fi
            echo "Waiting for production agent ($attempt/60)..."
            sleep 10
          done
          echo "::error::Production agent did not become reachable in time"
          exit 1

      - name: Mint production activation session
        working-directory: server
        env:
          SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          SUPABASE_ANON_KEY: ${{ steps.contract.outputs.supabase_anon_key }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
          SMOKE_SESSION_FILE: ${{ env.PRODUCTION_ACTIVATION_SESSION_FILE }}
        # Hosted activation smoke signs the activation session out on success,
        # so it must not reuse the browser session that later chat/timeline
        # tests depend on.
        run: node scripts/mint-smoke-session.mjs >/dev/null

      - name: Wait for production agent runtime parity
        if: ${{ steps.targets.outputs.agent_url != '' }}
        working-directory: server
        env:
          PARITY_AGENT_BASE: ${{ steps.targets.outputs.agent_url }}
          PARITY_RUNTIME_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          PARITY_EXPECT_COMMIT_SHA: ${{ github.sha }}
          PARITY_EXPECT_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          PARITY_EXPECT_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          PARITY_REQUIRED_KEYS: ${{ steps.contract.outputs.audit_required_runtime_keys_csv }}
          PARITY_WAIT_TIMEOUT_MS: 600000
          PARITY_WAIT_INTERVAL_MS: 10000
        run: node scripts/wait-for-runtime-parity.mjs

      - name: Audit deployed production stack
        if: ${{ steps.targets.outputs.agent_url != '' }}
        working-directory: server
        env:
          AUDIT_UI_BASE: ${{ steps.targets.outputs.ui_url }}
          AUDIT_AGENT_BASE: ${{ steps.targets.outputs.agent_url }}
          AUDIT_RUNTIME_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          AUDIT_EXPECT_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          AUDIT_EXPECT_COMMIT_SHA: ${{ github.sha }}
          AUDIT_EXPECT_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          AUDIT_EXPECT_SUPABASE_PROJECT_REF: ${{ steps.contract.outputs.supabase_project_ref }}
          AUDIT_REQUIRE_ANTHROPIC: ${{ steps.contract.outputs.audit_require_anthropic }}
          AUDIT_REQUIRE_AGENT_COMMIT_MATCH: ${{ steps.contract.outputs.audit_require_agent_commit_match }}
          AUDIT_REQUIRE_FIRST_PARTY_AGENT: ${{ steps.contract.outputs.audit_require_first_party_agent }}
          AUDIT_REQUIRED_RUNTIME_KEYS: ${{ steps.contract.outputs.audit_required_runtime_keys_csv }}
          AUDIT_WAIT_TIMEOUT_MS: ${{ steps.contract.outputs.audit_wait_timeout_ms }}
          AUDIT_WAIT_INTERVAL_MS: ${{ steps.contract.outputs.audit_wait_interval_ms }}
        run: node scripts/audit-deployed-stack.mjs

      - name: Run production base and activation smoke tests
        env:
          E2E_BASE_URL: ${{ steps.targets.outputs.ui_url }}
          E2E_DEPLOY_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          E2E_AGENT_HTTP_BASE: ${{ steps.targets.outputs.agent_url }}
          E2E_AGENT_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          E2E_SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          E2E_EXPECT_PROGRAM_ID: ${{ steps.contract.outputs.smoke_expected_program_id }}
          E2E_EXPECT_EXPERIMENT_ID: ${{ steps.contract.outputs.smoke_expected_experiment_id }}
          E2E_EXPECT_TIMELINE_AUTH_MODE: ${{ steps.contract.outputs.smoke_expected_timeline_auth_mode }}
          E2E_CHAT_PROMPT: ${{ steps.contract.outputs.managed_auth_audit_prompt }}
          PRODUCTION_SMOKE_SESSION_FILE: ${{ env.PRODUCTION_SMOKE_SESSION_FILE }}
          PRODUCTION_ACTIVATION_SESSION_FILE: ${{ env.PRODUCTION_ACTIVATION_SESSION_FILE }}
        run: |
          if [ -f "$PRODUCTION_ACTIVATION_SESSION_FILE" ]; then
            E2E_ACTIVATION_SESSION_JSON="$(cat "$PRODUCTION_ACTIVATION_SESSION_FILE")"
            export E2E_ACTIVATION_SESSION_JSON
          fi
          npm run test:e2e:hosted -- --grep-invert @authenticated

      - name: Mint production smoke session
        working-directory: server
        env:
          SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          SUPABASE_ANON_KEY: ${{ steps.contract.outputs.supabase_anon_key }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
          SMOKE_SESSION_FILE: ${{ env.PRODUCTION_SMOKE_SESSION_FILE }}
        # Supabase can revoke earlier sessions for the same user, so mint the
        # authenticated-app session only after the activation suite completes.
        run: node scripts/mint-smoke-session.mjs >/dev/null

      - name: Run production managed auth audit
        if: ${{ steps.targets.outputs.agent_url != '' }}
        working-directory: server
        env:
          MANAGED_AUTH_AUDIT_HTTP_BASE: ${{ steps.targets.outputs.agent_url }}
          MANAGED_AUTH_AUDIT_PROMPT: ${{ steps.contract.outputs.managed_auth_audit_prompt }}
          MANAGED_AUTH_AUDIT_STALE_SESSION: ${{ steps.contract.outputs.managed_auth_audit_stale_session }}
          MANAGED_AUTH_AUDIT_REQUIRE_TOOL_USE: ${{ steps.contract.outputs.managed_auth_audit_require_tool_use }}
          MANAGED_AUTH_AUDIT_EXPECT_SUBSTRING: ${{ steps.contract.outputs.managed_auth_audit_expect_substring }}
          MANAGED_AUTH_AUDIT_TIMEOUT_MS: ${{ steps.contract.outputs.managed_auth_audit_timeout_ms }}
          MANAGED_AUTH_AUDIT_PREWARM_TIMEOUT_MS: ${{ steps.contract.outputs.managed_auth_audit_prewarm_timeout_ms }}
          MANAGED_AUTH_AUDIT_RETRY_INTERVAL_MS: ${{ steps.contract.outputs.managed_auth_audit_retry_interval_ms }}
          MANAGED_AUTH_AUDIT_SESSION_FILE: ${{ env.PRODUCTION_SMOKE_SESSION_FILE }}
        run: node scripts/run-managed-auth-audit.mjs

      - name: Run production authenticated smoke tests
        env:
          E2E_BASE_URL: ${{ steps.targets.outputs.ui_url }}
          E2E_DEPLOY_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          E2E_AGENT_HTTP_BASE: ${{ steps.targets.outputs.agent_url }}
          E2E_AGENT_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          E2E_SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          E2E_EXPECT_PROGRAM_ID: ${{ steps.contract.outputs.smoke_expected_program_id }}
          E2E_EXPECT_EXPERIMENT_ID: ${{ steps.contract.outputs.smoke_expected_experiment_id }}
          E2E_EXPECT_TIMELINE_AUTH_MODE: ${{ steps.contract.outputs.smoke_expected_timeline_auth_mode }}
          E2E_CHAT_PROMPT: ${{ steps.contract.outputs.managed_auth_audit_prompt }}
          PRODUCTION_SMOKE_SESSION_FILE: ${{ env.PRODUCTION_SMOKE_SESSION_FILE }}
        run: |
          if [ -f "$PRODUCTION_SMOKE_SESSION_FILE" ]; then
            E2E_AUTH_SESSION_JSON="$(cat "$PRODUCTION_SMOKE_SESSION_FILE")"
            export E2E_AUTH_SESSION_JSON
          fi
          npm run test:e2e:hosted -- --grep @authenticated

      - name: Upload report on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: production-smoke-report
          if-no-files-found: ignore
          path: |
            ui/playwright-report/
            ui/test-results/
