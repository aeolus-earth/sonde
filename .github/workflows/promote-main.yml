name: Promote Main

on:
  workflow_run:
    workflows: ["Staging Smoke"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-main-staging
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'staging' &&
          github.event.workflow_run.event == 'push'
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Require promotion token
        env:
          PROMOTION_GITHUB_TOKEN: ${{ secrets.SONDE_PROMOTION_GITHUB_TOKEN }}
        run: |
          if [ -z "${PROMOTION_GITHUB_TOKEN}" ]; then
            echo "::error title=Missing SONDE_PROMOTION_GITHUB_TOKEN::Add a fine-grained GitHub token with Contents: Read and write and Pull requests: Read and write to the SONDE_PROMOTION_GITHUB_TOKEN repo secret."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Open or update staging promotion PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.SONDE_PROMOTION_GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const {
              REQUIRED_STAGING_WORKFLOWS,
              hasPromotableTreeDiff,
              isMainAheadOfStaging,
              promotionBody,
            } = await import(`file://${process.env.GITHUB_WORKSPACE}/server/scripts/promotion-state.mjs`);

            const stagingRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: "heads/staging",
            });
            const currentStagingSha = stagingRef.data.object.sha;
            const triggerSha =
              context.eventName === "workflow_dispatch"
                ? currentStagingSha
                : context.payload.workflow_run.head_sha;

            if (context.eventName !== "workflow_dispatch" && triggerSha !== currentStagingSha) {
              core.notice(
                `Skipping promotion for ${triggerSha} because staging has already moved to ${currentStagingSha}.`
              );
              return;
            }

            const title = "Promote staging to main";

            async function upsertPromotionPr(body) {
              const existing = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                base: "main",
                head: `${owner}:staging`,
              });

              let pr = existing.data[0];
              if (!pr) {
                const created = await github.rest.pulls.create({
                  owner,
                  repo,
                  base: "main",
                  head: "staging",
                  title,
                  body,
                  maintainer_can_modify: false,
                });
                pr = created.data;
                core.info(`Created promotion PR #${pr.number}: ${pr.html_url}`);
              } else {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pr.number,
                  title,
                  body,
                });
                core.info(`Updated promotion PR #${pr.number}: ${pr.html_url}`);
              }

              return pr;
            }

            async function waitForWorkflowSuccess(workflowId, workflowName, headSha) {
              for (let attempt = 1; attempt <= 20; attempt += 1) {
                const response = await github.request(
                  "GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs",
                  {
                    owner,
                    repo,
                    workflow_id: workflowId,
                    branch: "staging",
                    per_page: 20,
                  }
                );

                const run = response.data.workflow_runs.find((candidate) => candidate.head_sha === headSha);
                if (!run) {
                  core.info(`[${workflowName}] waiting for run to appear (${attempt}/20)`);
                  await sleep(15000);
                  continue;
                }

                core.info(
                  `[${workflowName}] status=${run.status} conclusion=${run.conclusion ?? "n/a"} url=${run.html_url}`
                );

                if (run.status !== "completed") {
                  await sleep(15000);
                  continue;
                }

                if (run.conclusion !== "success") {
                  core.setFailed(
                    `${workflowName} did not pass for staging @ ${headSha}. See ${run.html_url}`
                  );
                  return null;
                }

                return run;
              }

              core.setFailed(`Timed out waiting for ${workflowName} on staging @ ${headSha}.`);
              return null;
            }

            const stagingDiff = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: "main...staging",
            });

            if (!hasPromotableTreeDiff(stagingDiff.data)) {
              core.notice("staging and main already have the same tree. Nothing to promote.");
              return;
            }

            const mainAhead = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: "staging...main",
            });

            if (isMainAheadOfStaging(mainAhead.data)) {
              const pr = await upsertPromotionPr(
                promotionBody({
                  stagingSha: triggerSha,
                  state: "syncing",
                })
              );
              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                  expected_head_sha: currentStagingSha,
                });
              } catch (error) {
                core.setFailed(
                  `staging is behind main and could not be updated automatically for PR #${pr.number}: ${error.message}`
                );
                return;
              }

              await core.summary
                .addHeading("Promotion branch update requested")
                .addRaw(`PR #${pr.number}`)
                .addBreak()
                .addLink(pr.html_url, pr.html_url)
                .addBreak()
                .addRaw(
                  "staging was behind main, so the workflow updated the PR branch and stopped before enabling auto-merge. Fresh staging checks must pass on the updated staging commit."
                )
                .write();
              return;
            }

            const successfulRuns = [];
            for (const workflow of REQUIRED_STAGING_WORKFLOWS) {
              const run = await waitForWorkflowSuccess(
                workflow.workflowId,
                workflow.name,
                triggerSha
              );
              if (!run) {
                return;
              }
              successfulRuns.push(run);
            }

            const pr = await upsertPromotionPr(
              promotionBody({
                stagingSha: triggerSha,
                successfulRuns,
              })
            );

            const prData = await github.graphql(
              `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      id
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `,
              {
                owner,
                repo,
                number: pr.number,
              }
            );

            if (!prData.repository.pullRequest.autoMergeRequest) {
              await github.graphql(
                `
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: {
                        pullRequestId: $pullRequestId
                        mergeMethod: MERGE
                      }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                {
                  pullRequestId: prData.repository.pullRequest.id,
                }
              );
              core.info(`Enabled auto-merge for promotion PR #${pr.number}`);
            } else {
              core.info(`Auto-merge already enabled for promotion PR #${pr.number}`);
            }

            await core.summary
              .addHeading("Promotion PR ready")
              .addRaw(`PR #${pr.number}`)
              .addBreak()
              .addLink(pr.html_url, pr.html_url)
              .addBreak()
              .addList(successfulRuns.map((run) => `${run.name}: ${run.html_url}`))
              .write();
