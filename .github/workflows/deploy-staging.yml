name: Sync Staging Infra

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      seed_only:
        description: "Skip migrations and re-apply only the linked staging seed"
        required: false
        type: boolean
        default: false
      allow_ref_mismatch:
        description: "Allow running staging deploy from a non-staging ref"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Validate staging deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" != "staging" ] && [ "${{ inputs.allow_ref_mismatch }}" != "true" ]; then
            echo "::error::Sync Staging Infra must be dispatched from the staging branch unless allow_ref_mismatch=true."
            exit 1
          fi

  changes:
    runs-on: ubuntu-latest
    needs: validate-ref
    outputs:
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
              - '.github/workflows/deploy-staging.yml'

  push-staging-database:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        vars.SUPABASE_STAGING_PROJECT_REF != '' &&
        (
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.database == 'true'
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations and seed to staging
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.seed_only }}
        run: supabase db push --include-seed --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Re-apply staging seed only
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_only }}
        run: supabase seed --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push staged Supabase config
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.seed_only }}
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/supabase"
          cp supabase/config.toml "$TMPDIR/supabase/config.toml"
          node server/scripts/render-supabase-hosted-config.mjs "$TMPDIR/supabase/config.toml"
          supabase config push --workdir "$TMPDIR" --project-ref "${SUPABASE_PROJECT_REF}" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: ${{ secrets.SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN || '' }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_APPLE_SECRET || '' }}
          S3_HOST: ${{ secrets.S3_HOST || '' }}
          S3_REGION: ${{ secrets.S3_REGION || '' }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY || '' }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY || '' }}
          SUPABASE_HOSTED_SITE_URL: ${{ vars.SONDE_STAGING_UI_URL }}
          SUPABASE_HOSTED_ADDITIONAL_REDIRECT_URLS: https://sonde-staging.vercel.app/auth/callback,http://localhost:5173/auth/callback,http://127.0.0.1:5173/auth/callback,http://localhost:*/callback,http://127.0.0.1:*/callback
          SUPABASE_HOSTED_STORAGE_FILE_SIZE_LIMIT: 50MiB

      - name: Verify schema version after staging deploy
        if: ${{ vars.SUPABASE_STAGING_ANON_KEY != '' }}
        run: |
          if VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            "https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version"); then
            echo "Schema version after staging deploy: $VERSION"
          else
            echo "::notice::Skipping strict schema verification because get_schema_version is not reachable with the configured staging publishable key"
          fi
