name: Deploy Staging

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  push-staging-migrations:
    runs-on: ubuntu-latest
    # Only run if staging secrets are configured
    if: ${{ vars.SUPABASE_STAGING_PROJECT_REF != '' }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to staging
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Report staging status
        run: echo "Staging migrations applied successfully"
