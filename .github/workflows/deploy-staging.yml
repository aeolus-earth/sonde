name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      seed_only:
        description: "Skip migrations and re-apply only the linked staging seed"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      database: ${{ steps.filter.outputs.database }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
            agent:
              - 'Dockerfile'
              - '.dockerignore'
              - 'cli/**'
              - 'server/**'
            ui:
              - 'ui/**'
              - 'vercel.json'

  push-staging-database:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        vars.SUPABASE_STAGING_PROJECT_REF != '' &&
        (
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.database == 'true'
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations and seed to staging
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.seed_only }}
        run: supabase db push --include-seed --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Re-apply staging seed only
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_only }}
        run: supabase seed --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify schema version after staging deploy
        if: ${{ vars.SUPABASE_STAGING_ANON_KEY != '' }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            "https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version")
          echo "Schema version after staging deploy: $VERSION"

  deploy-staging-agent:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.agent == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          !inputs.seed_only
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Restore Railway CLI auth
        env:
          RAILWAY_CONFIG_JSON: ${{ secrets.RAILWAY_CLI_CONFIG_JSON }}
        run: |
          if [ -z "$RAILWAY_CONFIG_JSON" ]; then
            echo "::error::Missing RAILWAY_CLI_CONFIG_JSON secret"
            exit 1
          fi
          mkdir -p "$HOME/.railway"
          printf '%s' "$RAILWAY_CONFIG_JSON" > "$HOME/.railway/config.json"

      - name: Link Railway staging project
        run: |
          railway link \
            -w "${{ vars.RAILWAY_WORKSPACE_ID }}" \
            -p "${{ vars.RAILWAY_STAGING_PROJECT_ID }}" \
            -e "${{ vars.RAILWAY_STAGING_ENVIRONMENT_ID }}" \
            --json >/tmp/railway-link.json

      - name: Pin deployed commit metadata
        run: |
          railway variable set \
            -s "${{ vars.RAILWAY_STAGING_SERVICE_NAME }}" \
            -e production \
            --skip-deploys \
            SONDE_COMMIT_SHA="${GITHUB_SHA}" \
            SONDE_CLI_GIT_REF="${GITHUB_SHA}"

      - name: Deploy staging agent
        run: railway up --service "${{ vars.RAILWAY_STAGING_SERVICE_NAME }}" --detach --ci

  deploy-staging-ui:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.ui == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          !inputs.seed_only
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Restore Vercel CLI auth
        env:
          VERCEL_AUTH_JSON: ${{ secrets.VERCEL_AUTH_JSON }}
        run: |
          if [ -z "$VERCEL_AUTH_JSON" ]; then
            echo "::error::Missing VERCEL_AUTH_JSON secret"
            exit 1
          fi
          mkdir -p "$HOME/Library/Application Support/com.vercel.cli"
          printf '%s' "$VERCEL_AUTH_JSON" > "$HOME/Library/Application Support/com.vercel.cli/auth.json"

      - name: Link staging Vercel project
        run: npx --yes vercel@50.18.1 link --project sonde-staging --scope "${{ vars.VERCEL_TEAM_SCOPE }}" --yes

      - name: Deploy staging UI
        run: npx --yes vercel@50.18.1 deploy --prod --scope "${{ vars.VERCEL_TEAM_SCOPE }}" --yes
