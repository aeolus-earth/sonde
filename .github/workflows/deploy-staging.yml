name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      seed_only:
        description: "Skip migrations and re-apply only the linked staging seed"
        required: false
        type: boolean
        default: false
      allow_ref_mismatch:
        description: "Allow running staging deploy from a non-staging ref"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Validate staging deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" != "staging" ] && [ "${{ inputs.allow_ref_mismatch }}" != "true" ]; then
            echo "::error::Deploy Staging must be dispatched from the staging branch unless allow_ref_mismatch=true."
            exit 1
          fi

  changes:
    runs-on: ubuntu-latest
    needs: validate-ref
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      database: ${{ steps.filter.outputs.database }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
            agent:
              - 'Dockerfile'
              - '.dockerignore'
              - 'cli/**'
              - 'server/**'
            ui:
              - 'ui/**'
              - 'vercel.json'
              - 'ui/vercel.json'

  trigger-staging-ui:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.ui == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - name: Trigger staging UI deploy
        env:
          VERCEL_STAGING_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "::notice::Skipping staging UI deploy trigger because VERCEL_STAGING_DEPLOY_HOOK_URL is not configured"
            exit 0
          fi
          curl -sf -X POST "$VERCEL_STAGING_DEPLOY_HOOK_URL"

  push-staging-database:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        vars.SUPABASE_STAGING_PROJECT_REF != '' &&
        (
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.database == 'true'
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations and seed to staging
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.seed_only }}
        run: supabase db push --include-seed --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Re-apply staging seed only
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_only }}
        run: supabase seed --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push staged Supabase config
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.seed_only }}
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/supabase"
          cp supabase/config.toml "$TMPDIR/supabase/config.toml"
          node server/scripts/render-supabase-hosted-config.mjs "$TMPDIR/supabase/config.toml"
          supabase config push --workdir "$TMPDIR" --project-ref "${SUPABASE_PROJECT_REF}" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: ${{ secrets.SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN || '' }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_APPLE_SECRET || '' }}
          S3_HOST: ${{ secrets.S3_HOST || '' }}
          S3_REGION: ${{ secrets.S3_REGION || '' }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY || '' }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY || '' }}
          SUPABASE_HOSTED_SITE_URL: ${{ vars.SONDE_STAGING_UI_URL }}
          SUPABASE_HOSTED_ADDITIONAL_REDIRECT_URLS: https://sonde-staging.vercel.app/auth/callback,http://localhost:5173/auth/callback,http://127.0.0.1:5173/auth/callback,http://localhost:*/callback,http://127.0.0.1:*/callback
          SUPABASE_HOSTED_STORAGE_FILE_SIZE_LIMIT: 50MiB

      - name: Verify schema version after staging deploy
        if: ${{ vars.SUPABASE_STAGING_ANON_KEY != '' }}
        run: |
          if VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            "https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version"); then
            echo "Schema version after staging deploy: $VERSION"
          else
            echo "::notice::Skipping strict schema verification because get_schema_version is not reachable with the configured staging publishable key"
          fi

  deploy-staging-agent:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.agent == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          !inputs.seed_only
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve staging schema version
        id: schema
        if: ${{ vars.SUPABASE_STAGING_PROJECT_REF != '' && vars.SUPABASE_STAGING_ANON_KEY != '' }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            "https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version" | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway staging token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_PROJECT_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Missing RAILWAY_STAGING_PROJECT_TOKEN secret"
            exit 1
          fi
          railway run \
            -p "${{ vars.RAILWAY_STAGING_PROJECT_ID }}" \
            -e "${{ vars.RAILWAY_STAGING_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_STAGING_SERVICE_NAME }}" \
            env >/tmp/railway-staging-env.txt

      - name: Pin deployed commit metadata
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_PROJECT_TOKEN }}
          SONDE_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          SONDE_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_STAGING_AGENT_RUNTIME_AUDIT_TOKEN }}
          SONDE_WS_TOKEN_SECRET: ${{ secrets.SONDE_STAGING_WS_TOKEN_SECRET }}
          SONDE_GITHUB_ALLOWED_REPOS: ${{ vars.SONDE_GITHUB_ALLOWED_REPOS }}
        run: |
          SCHEMA_VERSION="${SONDE_SCHEMA_VERSION:-unknown}"
          railway variable set \
            -s "${{ vars.RAILWAY_STAGING_SERVICE_NAME }}" \
            -e production \
            --skip-deploys \
            VITE_SUPABASE_URL="https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co" \
            VITE_SUPABASE_ANON_KEY="${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            SONDE_ALLOWED_ORIGINS="${{ vars.SONDE_STAGING_UI_URL }}" \
            SONDE_ENVIRONMENT="staging" \
            SONDE_COMMIT_SHA="${GITHUB_SHA}" \
            SONDE_CLI_GIT_REF="${GITHUB_SHA}" \
            SONDE_SCHEMA_VERSION="${SCHEMA_VERSION}" \
            SONDE_RUNTIME_AUDIT_TOKEN="${SONDE_RUNTIME_AUDIT_TOKEN}" \
            SONDE_WS_TOKEN_SECRET="${SONDE_WS_TOKEN_SECRET}" \
            SONDE_GITHUB_ALLOWED_REPOS="${SONDE_GITHUB_ALLOWED_REPOS}"

      - name: Deploy staging agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_PROJECT_TOKEN }}
        run: |
          railway up \
            -p "${{ vars.RAILWAY_STAGING_PROJECT_ID }}" \
            -e "${{ vars.RAILWAY_STAGING_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_STAGING_SERVICE_NAME }}" \
            --detach \
            --ci
