name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      allow_ref_mismatch:
        description: "Allow running production deploy from a non-main ref"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Validate production deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ inputs.allow_ref_mismatch }}" != "true" ]; then
            echo "::error::Deploy Production must be dispatched from the main branch unless allow_ref_mismatch=true."
            exit 1
          fi

  changes:
    runs-on: ubuntu-latest
    needs: validate-ref
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
            agent:
              - 'Dockerfile'
              - '.dockerignore'
              - 'cli/**'
              - 'server/**'

  push-migrations:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.database == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to hosted project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push hosted Supabase config
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/supabase"
          cp supabase/config.toml "$TMPDIR/supabase/config.toml"
          node server/scripts/render-supabase-hosted-config.mjs "$TMPDIR/supabase/config.toml"
          supabase config push --workdir "$TMPDIR" --project-ref "${SUPABASE_PROJECT_REF}" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: ${{ secrets.SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN || '' }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_APPLE_SECRET || '' }}
          S3_HOST: ${{ secrets.S3_HOST || '' }}
          S3_REGION: ${{ secrets.S3_REGION || '' }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY || '' }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY || '' }}
          SUPABASE_HOSTED_SITE_URL: ${{ vars.SONDE_UI_URL }}
          SUPABASE_HOSTED_ADDITIONAL_REDIRECT_URLS: https://sonde-neon.vercel.app/auth/callback,https://*.vercel.app/**,http://localhost:5173/auth/callback,http://127.0.0.1:5173/auth/callback,http://localhost:*/callback,http://127.0.0.1:*/callback
          SUPABASE_HOSTED_STORAGE_FILE_SIZE_LIMIT: 50MiB

      - name: Verify schema version after deploy
        run: |
          if VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version"); then
            echo "Schema version after deploy: $VERSION"
          else
            echo "::notice::Skipping strict schema verification because get_schema_version is not reachable with the configured production publishable key"
          fi

  deploy-production-agent:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.agent == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve production schema version
        id: schema
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::notice::Skipping schema lookup because SUPABASE_PROJECT_REF or SUPABASE_ANON_KEY is not configured"
            exit 0
          fi
          VERSION=$(curl -sf \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/rest/v1/rpc/get_schema_version" | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway production token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Missing RAILWAY_PRODUCTION_PROJECT_TOKEN secret"
            exit 1
          fi
          railway run \
            -p "${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            env >/tmp/railway-production-env.txt

      - name: Pin deployed commit metadata
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          SONDE_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
        run: |
          SCHEMA_VERSION="${SONDE_SCHEMA_VERSION:-unknown}"
          railway variable set \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            -e production \
            --skip-deploys \
            VITE_SUPABASE_URL="https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co" \
            VITE_SUPABASE_ANON_KEY="${{ vars.SUPABASE_ANON_KEY }}" \
            SONDE_ALLOWED_ORIGINS="${{ vars.SONDE_UI_URL }}" \
            SONDE_ENVIRONMENT="production" \
            SONDE_COMMIT_SHA="${GITHUB_SHA}" \
            SONDE_CLI_GIT_REF="${GITHUB_SHA}" \
            SONDE_SCHEMA_VERSION="${SCHEMA_VERSION}"

      - name: Deploy production agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
        run: |
          railway up \
            -p "${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            --detach \
            --ci
