name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
            agent:
              - 'Dockerfile'
              - '.dockerignore'
              - 'cli/**'
              - 'server/**'

  push-migrations:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.database == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to hosted project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify schema version after deploy
        run: |
          VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version")
          echo "Schema version after deploy: $VERSION"

  deploy-production-agent:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.agent == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Restore Railway CLI auth
        env:
          RAILWAY_CONFIG_JSON: ${{ secrets.RAILWAY_CLI_CONFIG_JSON }}
        run: |
          if [ -z "$RAILWAY_CONFIG_JSON" ]; then
            echo "::error::Missing RAILWAY_CLI_CONFIG_JSON secret"
            exit 1
          fi
          mkdir -p "$HOME/.railway"
          printf '%s' "$RAILWAY_CONFIG_JSON" > "$HOME/.railway/config.json"

      - name: Link Railway production project
        run: |
          railway link \
            -w "${{ vars.RAILWAY_WORKSPACE_ID }}" \
            -p "${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            --json >/tmp/railway-link.json

      - name: Pin deployed commit metadata
        run: |
          railway variable set \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            -e production \
            --skip-deploys \
            SONDE_COMMIT_SHA="${GITHUB_SHA}" \
            SONDE_CLI_GIT_REF="${GITHUB_SHA}"

      - name: Deploy production agent
        run: railway up --service "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" --detach --ci
