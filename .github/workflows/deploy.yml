name: Sync Production Infra

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      allow_ref_mismatch:
        description: "Allow running production deploy from a non-main ref"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Validate production deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ inputs.allow_ref_mismatch }}" != "true" ]; then
            echo "::error::Sync Production Infra must be dispatched from the main branch unless allow_ref_mismatch=true."
            exit 1
          fi

  changes:
    runs-on: ubuntu-latest
    needs: validate-ref
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
              - 'config/hosted-environments.json'
              - '.github/workflows/deploy.yml'
            agent:
              - 'Dockerfile'
              - '.dockerignore'
              - 'cli/**'
              - 'server/**'
              - 'config/hosted-environments.json'
              - '.github/workflows/deploy.yml'

  push-migrations:
    runs-on: ubuntu-latest
    environment: production
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.database == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Load hosted production contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: production
          validation-profile: deploy-db
          ui-url: ${{ vars.SONDE_UI_URL }}
          agent-url: ${{ vars.SONDE_AGENT_HTTP_BASE }}
          supabase-project-ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ vars.SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ vars.SONDE_PRODUCTION_UPSTASH_REDIS_REST_URL }}
          redis-token: ${{ secrets.SONDE_PRODUCTION_UPSTASH_REDIS_REST_TOKEN }}
          require-shared-rate-limit: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to hosted project
        run: supabase link --project-ref ${{ steps.contract.outputs.supabase_project_ref }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push hosted Supabase config
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/supabase"
          cp supabase/config.toml "$TMPDIR/supabase/config.toml"
          node server/scripts/render-supabase-hosted-config.mjs "$TMPDIR/supabase/config.toml"
          supabase config push --workdir "$TMPDIR" --project-ref "${SUPABASE_PROJECT_REF}" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ steps.contract.outputs.supabase_project_ref }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: ${{ secrets.SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN || '' }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_APPLE_SECRET || '' }}
          S3_HOST: ${{ secrets.S3_HOST || '' }}
          S3_REGION: ${{ secrets.S3_REGION || '' }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY || '' }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY || '' }}
          SUPABASE_HOSTED_SITE_URL: ${{ steps.contract.outputs.site_url }}
          SUPABASE_HOSTED_ADDITIONAL_REDIRECT_URLS: ${{ steps.contract.outputs.redirect_urls_csv }}
          SUPABASE_HOSTED_STORAGE_FILE_SIZE_LIMIT: ${{ steps.contract.outputs.storage_file_size_limit }}

      - name: Verify schema version after deploy
        run: |
          if VERSION=$(curl -sf \
            -H "apikey: ${{ steps.contract.outputs.supabase_anon_key }}" \
            -H "Authorization: Bearer ${{ steps.contract.outputs.supabase_anon_key }}" \
            "https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co/rest/v1/rpc/get_schema_version"); then
            echo "Schema version after deploy: $VERSION"
          else
            echo "::notice::Skipping strict schema verification because get_schema_version is not reachable with the configured production publishable key"
          fi

  deploy-production-agent:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - changes
      - push-migrations
    if: >-
      ${{
        always() &&
        (
          needs.push-migrations.result == 'success' ||
          needs.push-migrations.result == 'skipped'
        ) &&
        (
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch'
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Load hosted production contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: production
          validation-profile: deploy-agent
          ui-url: ${{ vars.SONDE_UI_URL }}
          agent-url: ${{ vars.SONDE_AGENT_HTTP_BASE }}
          supabase-project-ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ vars.SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ vars.SONDE_PRODUCTION_UPSTASH_REDIS_REST_URL }}
          redis-token: ${{ secrets.SONDE_PRODUCTION_UPSTASH_REDIS_REST_TOKEN }}
          require-shared-rate-limit: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - name: Resolve production schema version
        id: schema
        if: ${{ steps.contract.outputs.supabase_project_ref != '' && steps.contract.outputs.supabase_anon_key != '' }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: ${{ steps.contract.outputs.supabase_anon_key }}" \
            -H "Authorization: Bearer ${{ steps.contract.outputs.supabase_anon_key }}" \
            "https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co/rest/v1/rpc/get_schema_version" | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate required production runtime secrets
        env:
          REQUIRED_SECRETS_CSV: ${{ steps.contract.outputs.agent_runtime_secret_names_csv }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SONDE_WS_TOKEN_SECRET: ${{ secrets.SONDE_WS_TOKEN_SECRET }}
          SONDE_DEVICE_AUTH_ENCRYPTION_KEY: ${{ secrets.SONDE_DEVICE_AUTH_ENCRYPTION_KEY }}
          SONDE_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SONDE_AGENT_GITHUB_TOKEN: ${{ secrets.SONDE_AGENT_GITHUB_TOKEN }}
        run: |
          missing=()
          for name in ${REQUIRED_SECRETS_CSV//,/ }; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required production runtime secrets: ${missing[*]}"
            exit 1
          fi

      - name: Warn when production managed-cost secrets are missing
        env:
          SONDE_INTERNAL_ADMIN_TOKEN: ${{ secrets.SONDE_INTERNAL_ADMIN_TOKEN }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
        run: |
          if [ -z "${SONDE_INTERNAL_ADMIN_TOKEN:-}" ]; then
            echo "::warning::SONDE_INTERNAL_ADMIN_TOKEN is missing; scheduled managed-cost reconciliation will remain degraded."
          fi
          if [ -z "${ANTHROPIC_ADMIN_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_ADMIN_API_KEY is missing; provider-backed managed costs will remain unavailable."
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway production token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::Missing Railway production project token or project id"
            exit 1
          fi
          railway service status \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            --json >/tmp/railway-production-status.json

      - name: Pin production agent runtime metadata
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}
          SONDE_MANAGED_ENVIRONMENT_ID: ${{ vars.SONDE_ANTHROPIC_MANAGED_ENVIRONMENT_ID }}
          SONDE_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SONDE_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          SONDE_WS_TOKEN_SECRET: ${{ secrets.SONDE_WS_TOKEN_SECRET }}
          SONDE_DEVICE_AUTH_ENCRYPTION_KEY: ${{ secrets.SONDE_DEVICE_AUTH_ENCRYPTION_KEY }}
          SONDE_INTERNAL_ADMIN_TOKEN: ${{ secrets.SONDE_INTERNAL_ADMIN_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          SONDE_AGENT_GITHUB_TOKEN: ${{ secrets.SONDE_AGENT_GITHUB_TOKEN }}
          SONDE_GITHUB_ALLOWED_REPOS: ${{ vars.SONDE_GITHUB_ALLOWED_REPOS }}
        run: |
          if [ -z "$SONDE_MANAGED_ENVIRONMENT_ID" ]; then
            echo "::error::Missing SONDE_ANTHROPIC_MANAGED_ENVIRONMENT_ID repository variable"
            exit 1
          fi
          SCHEMA_VERSION="${SONDE_SCHEMA_VERSION:-unknown}"
          variable_args=(
            VITE_SUPABASE_URL="https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co"
            VITE_SUPABASE_ANON_KEY="${{ steps.contract.outputs.supabase_anon_key }}"
            SONDE_AGENT_BACKEND="managed"
            SONDE_MANAGED_ENVIRONMENT_ID="${SONDE_MANAGED_ENVIRONMENT_ID}"
            SONDE_MANAGED_AGENT_ID=" "
            SONDE_MANAGED_ALLOW_EPHEMERAL_AGENT="1"
            SONDE_ALLOWED_ORIGINS="${{ steps.contract.outputs.site_url }}"
            SONDE_PUBLIC_APP_ORIGIN="${{ steps.contract.outputs.site_url }}"
            SONDE_ENVIRONMENT="production"
            SONDE_COMMIT_SHA="${GITHUB_SHA}"
            SONDE_CLI_GIT_REF="${GITHUB_SHA}"
            SONDE_SCHEMA_VERSION="${SCHEMA_VERSION}"
            SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}"
            SONDE_RUNTIME_AUDIT_TOKEN="${SONDE_RUNTIME_AUDIT_TOKEN}"
            SONDE_WS_TOKEN_SECRET="${SONDE_WS_TOKEN_SECRET}"
            SONDE_DEVICE_AUTH_ENCRYPTION_KEY="${SONDE_DEVICE_AUTH_ENCRYPTION_KEY}"
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"
            GITHUB_TOKEN="${SONDE_AGENT_GITHUB_TOKEN}"
            SONDE_GITHUB_ALLOWED_REPOS="${SONDE_GITHUB_ALLOWED_REPOS}"
          )
          if [ -n "${SONDE_INTERNAL_ADMIN_TOKEN:-}" ]; then
            variable_args+=(SONDE_INTERNAL_ADMIN_TOKEN="${SONDE_INTERNAL_ADMIN_TOKEN}")
          fi
          if [ -n "${ANTHROPIC_ADMIN_API_KEY:-}" ]; then
            variable_args+=(ANTHROPIC_ADMIN_API_KEY="${ANTHROPIC_ADMIN_API_KEY}")
          fi
          railway variable delete \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            SONDE_MANAGED_AGENT_ID || true
          railway variable set \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            --skip-deploys \
            "${variable_args[@]}"

      - name: Deploy production agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}
        run: |
          railway up \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            --detach \
            --ci

      - name: Wait for production agent runtime parity
        working-directory: server
        env:
          PARITY_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          PARITY_RUNTIME_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          PARITY_EXPECT_COMMIT_SHA: ${{ github.sha }}
          PARITY_EXPECT_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          PARITY_EXPECT_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          PARITY_REQUIRED_KEYS: ${{ steps.contract.outputs.audit_required_runtime_keys_csv }}
          PARITY_WAIT_TIMEOUT_MS: 300000
          PARITY_WAIT_INTERVAL_MS: 10000
        run: node scripts/wait-for-runtime-parity.mjs

      - name: Audit deployed production stack
        if: ${{ steps.contract.outputs.agent_url != '' }}
        working-directory: server
        env:
          AUDIT_UI_BASE: ${{ steps.contract.outputs.ui_url }}
          AUDIT_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          AUDIT_RUNTIME_TOKEN: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          AUDIT_EXPECT_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          AUDIT_EXPECT_COMMIT_SHA: ${{ github.sha }}
          AUDIT_EXPECT_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          AUDIT_EXPECT_SUPABASE_PROJECT_REF: ${{ steps.contract.outputs.supabase_project_ref }}
          AUDIT_REQUIRE_ANTHROPIC: ${{ steps.contract.outputs.audit_require_anthropic }}
          AUDIT_REQUIRE_AGENT_COMMIT_MATCH: ${{ steps.contract.outputs.audit_require_agent_commit_match }}
          AUDIT_REQUIRE_FIRST_PARTY_AGENT: ${{ steps.contract.outputs.audit_require_first_party_agent }}
          AUDIT_REQUIRE_SHARED_RATE_LIMIT: ${{ steps.contract.outputs.audit_require_shared_rate_limit }}
          AUDIT_REQUIRED_RUNTIME_KEYS: ${{ steps.contract.outputs.audit_required_runtime_keys_csv }}
          AUDIT_WAIT_TIMEOUT_MS: 300000
          AUDIT_WAIT_INTERVAL_MS: 10000
        run: node scripts/audit-deployed-stack.mjs
