name: Sync Production Infra

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      allow_ref_mismatch:
        description: "Allow running production deploy from a non-main ref"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Validate production deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ inputs.allow_ref_mismatch }}" != "true" ]; then
            echo "::error::Sync Production Infra must be dispatched from the main branch unless allow_ref_mismatch=true."
            exit 1
          fi

  changes:
    runs-on: ubuntu-latest
    needs: validate-ref
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/**'
              - 'config/hosted-environments.json'
              - '.github/workflows/deploy.yml'
            agent:
              - 'Dockerfile'
              - '.dockerignore'
              - 'cli/**'
              - 'server/**'
              - 'config/hosted-environments.json'
              - '.github/workflows/deploy.yml'

  push-migrations:
    runs-on: ubuntu-latest
    environment: production
    needs: changes
    env:
      HOSTED_UI_URL: ${{ vars.SONDE_UI_URL || '' }}
      HOSTED_AGENT_URL: ${{ vars.SONDE_AGENT_HTTP_BASE || '' }}
      HOSTED_SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF || '' }}
      HOSTED_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || '' }}
      HOSTED_SMOKE_USER_EMAIL: ${{ secrets.SONDE_SMOKE_USER_EMAIL || secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL || '' }}
      HOSTED_SMOKE_USER_PASSWORD: ${{ secrets.SONDE_SMOKE_USER_PASSWORD || secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD || '' }}
      HOSTED_CLI_AUDIT_TOKEN: ${{ secrets.SONDE_CLI_AUDIT_TOKEN || secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN || '' }}
      HOSTED_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_AGENT_RUNTIME_AUDIT_TOKEN || secrets.SONDE_PRODUCTION_AGENT_RUNTIME_AUDIT_TOKEN || '' }}
      HOSTED_REDIS_URL: ${{ vars.SONDE_UPSTASH_REDIS_REST_URL || vars.SONDE_PRODUCTION_UPSTASH_REDIS_REST_URL || '' }}
      HOSTED_REDIS_TOKEN: ${{ secrets.SONDE_UPSTASH_REDIS_REST_TOKEN || secrets.SONDE_PRODUCTION_UPSTASH_REDIS_REST_TOKEN || '' }}
      HOSTED_REQUIRE_SHARED_RATE_LIMIT: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT || '' }}
      HOSTED_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID || '' }}
      HOSTED_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET || '' }}
    if: >-
      ${{
        needs.changes.outputs.database == 'true' ||
        github.event_name == 'workflow_dispatch'
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Load hosted production contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: production
          ui-url: ${{ env.HOSTED_UI_URL }}
          agent-url: ${{ env.HOSTED_AGENT_URL }}
          supabase-project-ref: ${{ env.HOSTED_SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ env.HOSTED_SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ env.HOSTED_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ env.HOSTED_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ env.HOSTED_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ env.HOSTED_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ env.HOSTED_REDIS_URL }}
          redis-token: ${{ env.HOSTED_REDIS_TOKEN }}
          require-shared-rate-limit: ${{ env.HOSTED_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ env.HOSTED_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ env.HOSTED_GOOGLE_CLIENT_SECRET }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to hosted project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push hosted Supabase config
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "$TMPDIR/supabase"
          cp supabase/config.toml "$TMPDIR/supabase/config.toml"
          node server/scripts/render-supabase-hosted-config.mjs "$TMPDIR/supabase/config.toml"
          supabase config push --workdir "$TMPDIR" --project-ref "${SUPABASE_PROJECT_REF}" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: ${{ secrets.SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN || '' }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
          SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_APPLE_SECRET || '' }}
          S3_HOST: ${{ secrets.S3_HOST || '' }}
          S3_REGION: ${{ secrets.S3_REGION || '' }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY || '' }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY || '' }}
          SUPABASE_HOSTED_SITE_URL: ${{ steps.contract.outputs.site_url }}
          SUPABASE_HOSTED_ADDITIONAL_REDIRECT_URLS: ${{ steps.contract.outputs.redirect_urls_csv }}
          SUPABASE_HOSTED_STORAGE_FILE_SIZE_LIMIT: ${{ steps.contract.outputs.storage_file_size_limit }}

      - name: Verify schema version after deploy
        run: |
          if VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version"); then
            echo "Schema version after deploy: $VERSION"
          else
            echo "::notice::Skipping strict schema verification because get_schema_version is not reachable with the configured production publishable key"
          fi

  deploy-production-agent:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - changes
      - push-migrations
    env:
      HOSTED_UI_URL: ${{ vars.SONDE_UI_URL || '' }}
      HOSTED_AGENT_URL: ${{ vars.SONDE_AGENT_HTTP_BASE || '' }}
      HOSTED_SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF || '' }}
      HOSTED_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || '' }}
      HOSTED_SMOKE_USER_EMAIL: ${{ secrets.SONDE_SMOKE_USER_EMAIL || secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL || '' }}
      HOSTED_SMOKE_USER_PASSWORD: ${{ secrets.SONDE_SMOKE_USER_PASSWORD || secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD || '' }}
      HOSTED_CLI_AUDIT_TOKEN: ${{ secrets.SONDE_CLI_AUDIT_TOKEN || secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN || '' }}
      HOSTED_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_AGENT_RUNTIME_AUDIT_TOKEN || secrets.SONDE_PRODUCTION_AGENT_RUNTIME_AUDIT_TOKEN || '' }}
      HOSTED_REDIS_URL: ${{ vars.SONDE_UPSTASH_REDIS_REST_URL || vars.SONDE_PRODUCTION_UPSTASH_REDIS_REST_URL || '' }}
      HOSTED_REDIS_TOKEN: ${{ secrets.SONDE_UPSTASH_REDIS_REST_TOKEN || secrets.SONDE_PRODUCTION_UPSTASH_REDIS_REST_TOKEN || '' }}
      HOSTED_REQUIRE_SHARED_RATE_LIMIT: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT || '' }}
      HOSTED_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID || '' }}
      HOSTED_GOOGLE_CLIENT_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET || '' }}
    if: >-
      ${{
        always() &&
        (
          needs.push-migrations.result == 'success' ||
          needs.push-migrations.result == 'skipped'
        ) &&
        (
          needs.changes.outputs.agent == 'true' ||
          github.event_name == 'workflow_dispatch'
        )
      }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Load hosted production contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: production
          ui-url: ${{ env.HOSTED_UI_URL }}
          agent-url: ${{ env.HOSTED_AGENT_URL }}
          supabase-project-ref: ${{ env.HOSTED_SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ env.HOSTED_SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ env.HOSTED_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ env.HOSTED_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ env.HOSTED_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ env.HOSTED_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ env.HOSTED_REDIS_URL }}
          redis-token: ${{ env.HOSTED_REDIS_TOKEN }}
          require-shared-rate-limit: ${{ env.HOSTED_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ env.HOSTED_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ env.HOSTED_GOOGLE_CLIENT_SECRET }}

      - name: Resolve production schema version
        id: schema
        if: ${{ steps.contract.outputs.supabase_project_ref != '' && steps.contract.outputs.supabase_anon_key != '' }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: ${{ steps.contract.outputs.supabase_anon_key }}" \
            -H "Authorization: Bearer ${{ steps.contract.outputs.supabase_anon_key }}" \
            "https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co/rest/v1/rpc/get_schema_version" | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway production token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::Missing Railway production project token or project id"
            exit 1
          fi
          railway service status \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            --json >/tmp/railway-production-status.json

      - name: Pin production agent runtime metadata
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}
          SONDE_MANAGED_ENVIRONMENT_ID: ${{ vars.SONDE_ANTHROPIC_MANAGED_ENVIRONMENT_ID }}
          SONDE_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          SONDE_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_AGENT_RUNTIME_AUDIT_TOKEN || secrets.SONDE_PRODUCTION_AGENT_RUNTIME_AUDIT_TOKEN }}
          SONDE_WS_TOKEN_SECRET: ${{ secrets.SONDE_WS_TOKEN_SECRET || secrets.SONDE_PRODUCTION_WS_TOKEN_SECRET }}
          SONDE_GITHUB_ALLOWED_REPOS: ${{ vars.SONDE_GITHUB_ALLOWED_REPOS }}
        run: |
          if [ -z "$SONDE_MANAGED_ENVIRONMENT_ID" ]; then
            echo "::error::Missing SONDE_ANTHROPIC_MANAGED_ENVIRONMENT_ID repository variable"
            exit 1
          fi
          SCHEMA_VERSION="${SONDE_SCHEMA_VERSION:-unknown}"
          railway variable delete \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            SONDE_MANAGED_AGENT_ID || true
          railway variable set \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            --skip-deploys \
            VITE_SUPABASE_URL="https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co" \
            VITE_SUPABASE_ANON_KEY="${{ steps.contract.outputs.supabase_anon_key }}" \
            SONDE_AGENT_BACKEND="managed" \
            SONDE_MANAGED_ENVIRONMENT_ID="${SONDE_MANAGED_ENVIRONMENT_ID}" \
            SONDE_MANAGED_AGENT_ID=" " \
            SONDE_MANAGED_ALLOW_EPHEMERAL_AGENT="1" \
            SONDE_ALLOWED_ORIGINS="${{ steps.contract.outputs.site_url }}" \
            SONDE_ENVIRONMENT="production" \
            SONDE_COMMIT_SHA="${GITHUB_SHA}" \
            SONDE_CLI_GIT_REF="${GITHUB_SHA}" \
            SONDE_SCHEMA_VERSION="${SCHEMA_VERSION}" \
            SONDE_RUNTIME_AUDIT_TOKEN="${SONDE_RUNTIME_AUDIT_TOKEN}" \
            SONDE_WS_TOKEN_SECRET="${SONDE_WS_TOKEN_SECRET}" \
            SONDE_GITHUB_ALLOWED_REPOS="${SONDE_GITHUB_ALLOWED_REPOS}"

      - name: Deploy production agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_PROJECT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PRODUCTION_PROJECT_ID }}
        run: |
          railway up \
            -e "${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT_ID }}" \
            -s "${{ vars.RAILWAY_PRODUCTION_SERVICE_NAME }}" \
            --detach \
            --ci

      - name: Wait for production agent runtime parity
        working-directory: server
        env:
          PARITY_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          PARITY_RUNTIME_TOKEN: ${{ secrets.SONDE_AGENT_RUNTIME_AUDIT_TOKEN || secrets.SONDE_PRODUCTION_AGENT_RUNTIME_AUDIT_TOKEN }}
          PARITY_EXPECT_COMMIT_SHA: ${{ github.sha }}
          PARITY_EXPECT_ENVIRONMENT: ${{ steps.contract.outputs.runtime_environment }}
          PARITY_EXPECT_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          PARITY_WAIT_TIMEOUT_MS: 300000
          PARITY_WAIT_INTERVAL_MS: 10000
        run: node scripts/wait-for-runtime-parity.mjs
