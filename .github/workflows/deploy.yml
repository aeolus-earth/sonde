name: Deploy Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  push-migrations:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-migrations
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to hosted project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify schema version after deploy
        run: |
          VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version")
          echo "Schema version after deploy: $VERSION"
