name: CLI Hosted Audit

on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to audit"
        required: true
        type: choice
        options:
          - staging
          - production
          - both
        default: both

permissions:
  contents: read

jobs:
  staging-cli-audit:
    if: >-
      ${{
        github.ref_name == 'staging' ||
        github.event.inputs.target == 'staging' ||
        github.event.inputs.target == 'both'
      }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: cli/uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Load hosted staging contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: staging
          validation-profile: cli-audit
          ui-url: ${{ vars.SONDE_STAGING_UI_URL }}
          agent-url: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          supabase-project-ref: ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          supabase-anon-key: ${{ vars.SUPABASE_STAGING_ANON_KEY }}
          smoke-user-email: ${{ secrets.SONDE_STAGING_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ secrets.SONDE_STAGING_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ secrets.SONDE_STAGING_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ vars.SONDE_STAGING_UPSTASH_REDIS_REST_URL }}
          redis-token: ${{ secrets.SONDE_STAGING_UPSTASH_REDIS_REST_TOKEN }}
          require-shared-rate-limit: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - name: Install Sonde CLI
        run: |
          uv tool install --force ./cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run staging CLI audit (agent token)
        working-directory: server
        env:
          SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          SUPABASE_ANON_KEY: ${{ steps.contract.outputs.supabase_anon_key }}
          CLI_AUDIT_SONDE_TOKEN: ${{ secrets.SONDE_STAGING_CLI_AUDIT_TOKEN }}
          CLI_AUDIT_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          SONDE_AGENT_HTTP_BASE: ${{ steps.contract.outputs.agent_url }}
          CLI_AUDIT_AUTH_MODE: token
          CLI_AUDIT_ENV: ${{ steps.contract.outputs.runtime_environment }}
          CLI_AUDIT_ALLOW_WRITE: "1"
          CLI_AUDIT_PROGRAM: ${{ steps.contract.outputs.smoke_expected_program_id }}
          CLI_AUDIT_EXPECT_EXPERIMENT_ID: ${{ steps.contract.outputs.smoke_expected_experiment_id }}
          CLI_AUDIT_WAIT_TIMEOUT_MS: ${{ steps.contract.outputs.audit_wait_timeout_ms }}
          CLI_AUDIT_WAIT_INTERVAL_MS: ${{ steps.contract.outputs.audit_wait_interval_ms }}
        run: node scripts/run-cli-hosted-audit.mjs

      - name: Run staging CLI audit (device approval contract)
        working-directory: server
        env:
          CLI_AUDIT_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          SUPABASE_ANON_KEY: ${{ steps.contract.outputs.supabase_anon_key }}
          CLI_AUDIT_AUTH_MODE: session
          CLI_AUDIT_ENV: ${{ steps.contract.outputs.runtime_environment }}
          CLI_AUDIT_ALLOW_WRITE: "1"
          CLI_AUDIT_PROGRAM: ${{ steps.contract.outputs.smoke_expected_program_id }}
          CLI_AUDIT_EXPECT_EXPERIMENT_ID: ${{ steps.contract.outputs.smoke_expected_experiment_id }}
          CLI_AUDIT_WAIT_TIMEOUT_MS: ${{ steps.contract.outputs.audit_wait_timeout_ms }}
          CLI_AUDIT_WAIT_INTERVAL_MS: ${{ steps.contract.outputs.audit_wait_interval_ms }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_STAGING_SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_STAGING_SMOKE_USER_PASSWORD }}
        run: node scripts/run-cli-hosted-audit.mjs

  production-cli-audit:
    if: >-
      ${{
        github.ref_name == 'main' ||
        github.event.inputs.target == 'production' ||
        github.event.inputs.target == 'both'
      }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: cli/uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Load hosted production contract
        id: contract
        uses: ./.github/actions/load-hosted-env
        with:
          environment-name: production
          validation-profile: cli-audit
          ui-url: ${{ vars.SONDE_UI_URL }}
          agent-url: ${{ vars.SONDE_AGENT_HTTP_BASE }}
          supabase-project-ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase-anon-key: ${{ vars.SUPABASE_ANON_KEY }}
          smoke-user-email: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          smoke-user-password: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
          cli-audit-token: ${{ secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN }}
          runtime-audit-token: ${{ secrets.SONDE_RUNTIME_AUDIT_TOKEN }}
          redis-url: ${{ vars.SONDE_PRODUCTION_UPSTASH_REDIS_REST_URL }}
          redis-token: ${{ secrets.SONDE_PRODUCTION_UPSTASH_REDIS_REST_TOKEN }}
          require-shared-rate-limit: ${{ vars.SONDE_REQUIRE_SHARED_RATE_LIMIT }}
          google-client-id: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
          google-client-secret: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}

      - name: Install Sonde CLI
        run: |
          uv tool install --force ./cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run production CLI audit (agent token)
        working-directory: server
        env:
          SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          SUPABASE_ANON_KEY: ${{ steps.contract.outputs.supabase_anon_key }}
          CLI_AUDIT_SONDE_TOKEN: ${{ secrets.SONDE_PRODUCTION_CLI_AUDIT_TOKEN }}
          CLI_AUDIT_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          SONDE_AGENT_HTTP_BASE: ${{ steps.contract.outputs.agent_url }}
          CLI_AUDIT_AUTH_MODE: token
          CLI_AUDIT_ENV: ${{ steps.contract.outputs.runtime_environment }}
          CLI_AUDIT_PROGRAM: ${{ steps.contract.outputs.smoke_expected_program_id }}
          CLI_AUDIT_EXPECT_EXPERIMENT_ID: ${{ steps.contract.outputs.smoke_expected_experiment_id }}
          CLI_AUDIT_WAIT_TIMEOUT_MS: ${{ steps.contract.outputs.audit_wait_timeout_ms }}
          CLI_AUDIT_WAIT_INTERVAL_MS: ${{ steps.contract.outputs.audit_wait_interval_ms }}
        run: node scripts/run-cli-hosted-audit.mjs

      - name: Run production CLI audit (device approval contract)
        working-directory: server
        env:
          CLI_AUDIT_AGENT_BASE: ${{ steps.contract.outputs.agent_url }}
          SUPABASE_URL: https://${{ steps.contract.outputs.supabase_project_ref }}.supabase.co
          SUPABASE_ANON_KEY: ${{ steps.contract.outputs.supabase_anon_key }}
          CLI_AUDIT_AUTH_MODE: session
          CLI_AUDIT_ENV: ${{ steps.contract.outputs.runtime_environment }}
          CLI_AUDIT_PROGRAM: ${{ steps.contract.outputs.smoke_expected_program_id }}
          CLI_AUDIT_EXPECT_EXPERIMENT_ID: ${{ steps.contract.outputs.smoke_expected_experiment_id }}
          CLI_AUDIT_WAIT_TIMEOUT_MS: ${{ steps.contract.outputs.audit_wait_timeout_ms }}
          CLI_AUDIT_WAIT_INTERVAL_MS: ${{ steps.contract.outputs.audit_wait_interval_ms }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_PRODUCTION_SMOKE_USER_PASSWORD }}
        run: node scripts/run-cli-hosted-audit.mjs
