name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "supabase/migrations/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "supabase/migrations/**"
      - ".github/workflows/ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Unit tests
        run: uv run pytest -m "not integration" --tb=short

  schema-integration:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply all migrations from scratch
        run: supabase db reset --linked=false

      - name: Capture local credentials
        id: sb
        run: |
          echo "url=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - name: Smoke test — schema version RPC exists
        env:
          SB_URL: ${{ steps.sb.outputs.url }}
          SB_KEY: ${{ steps.sb.outputs.anon_key }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/rpc/get_schema_version")
          echo "Schema version: $VERSION"
          test "$VERSION" -ge 1

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI
        working-directory: cli
        run: uv sync

      - name: Integration tests against local Supabase
        working-directory: cli
        env:
          AEOLUS_SUPABASE_URL: ${{ steps.sb.outputs.url }}
          AEOLUS_SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon_key }}
          AEOLUS_SUPABASE_SERVICE_ROLE_KEY: ${{ steps.sb.outputs.service_role_key }}
        run: uv run pytest -m integration --tb=short || true

      - name: Stop Supabase
        if: always()
        run: supabase stop
