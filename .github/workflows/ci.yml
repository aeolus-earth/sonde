name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      ui: ${{ steps.filter.outputs.ui }}
      server: ${{ steps.filter.outputs.server }}
      data: ${{ steps.filter.outputs.data }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - "cli/**"
            ui:
              - "ui/**"
            server:
              - "server/**"
            data:
              - "supabase/**"
            infra:
              - ".github/workflows/**"
              - "config/hosted-environments.json"
              - "vercel.ts"
              - "ui/vercel.ts"
              - "scripts/**"
              - ".githooks/**"
              - "Makefile"

  hosted-contract:
    name: hosted-contract
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.infra }}" == "true" || "${{ needs.changes.outputs.server }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No server or infra changes; skipping hosted contract checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - if: steps.gate.outputs.run == 'true'
        name: Validate hosted environment contract
        run: node server/scripts/hosted-env-contract.mjs check-parity

      - if: steps.gate.outputs.run == 'true'
        name: Validate hosted workflow action usage
        run: bash scripts/ci/check-hosted-workflow-action.sh

      - if: steps.gate.outputs.run == 'true'
        name: Validate hosted environment export logic with fixtures
        run: |
          node --input-type=module - <<'NODE'
          import {
            formatHostedEnvironmentForGithubOutputs,
            loadHostedEnvironmentContract,
            resolveHostedEnvironment,
            resolveHostedGithubEnvironmentEnv,
            validateHostedEnvironmentContract,
            validateResolvedHostedEnvironment,
          } from "./server/scripts/lib/hosted-env-contract.mjs";

          const contract = loadHostedEnvironmentContract();
          const contractErrors = validateHostedEnvironmentContract(contract);
          if (contractErrors.length > 0) {
            throw new Error(contractErrors.join("\n"));
          }

          const baseFixture = {
            SOURCE_UI_URL: "https://staging-ui.example.com",
            SOURCE_AGENT_URL: "https://staging-agent.example.com",
            SOURCE_SUPABASE_PROJECT_REF: "stageprojref",
            SOURCE_SUPABASE_ANON_KEY: "sb_publishable_stage_test",
            SOURCE_SMOKE_USER_EMAIL: "stage-smoke@example.com",
            SOURCE_SMOKE_USER_PASSWORD: "not-a-real-password",
            SOURCE_CLI_AUDIT_TOKEN: "stage-cli-token",
            SOURCE_RUNTIME_AUDIT_TOKEN: "stage-runtime-token",
            SOURCE_GOOGLE_CLIENT_ID: "google-client-id",
            SOURCE_GOOGLE_CLIENT_SECRET: "google-client-secret",
          };

          const cases = [
            {
              name: "deploy-db allows missing smoke creds",
              environment: "staging",
              profile: "deploy-db",
              fixture: {
                ...baseFixture,
                SOURCE_SMOKE_USER_EMAIL: "",
                SOURCE_SMOKE_USER_PASSWORD: "",
                SOURCE_CLI_AUDIT_TOKEN: "",
                SOURCE_RUNTIME_AUDIT_TOKEN: "",
              },
              shouldPass: true,
            },
            {
              name: "deploy-agent requires runtime token",
              environment: "staging",
              profile: "deploy-agent",
              fixture: {
                ...baseFixture,
                SOURCE_RUNTIME_AUDIT_TOKEN: "",
              },
              shouldPass: false,
              expectedError: "HOSTED_RUNTIME_AUDIT_TOKEN is required.",
            },
            {
              name: "config-audit requires smoke creds",
              environment: "staging",
              profile: "config-audit",
              fixture: {
                ...baseFixture,
                SOURCE_SMOKE_USER_EMAIL: "",
              },
              shouldPass: false,
              expectedError: "HOSTED_SMOKE_USER_EMAIL is required.",
            },
            {
              name: "cli-audit requires cli token",
              environment: "staging",
              profile: "cli-audit",
              fixture: {
                ...baseFixture,
                SOURCE_CLI_AUDIT_TOKEN: "",
              },
              shouldPass: false,
              expectedError: "HOSTED_CLI_AUDIT_TOKEN is required.",
            },
            {
              name: "smoke requires runtime token",
              environment: "staging",
              profile: "smoke",
              fixture: {
                ...baseFixture,
                SOURCE_RUNTIME_AUDIT_TOKEN: "",
              },
              shouldPass: false,
              expectedError: "HOSTED_RUNTIME_AUDIT_TOKEN is required.",
            },
            {
              name: "soak allows missing UI and smoke creds",
              environment: "staging",
              profile: "soak",
              fixture: {
                ...baseFixture,
                SOURCE_UI_URL: "",
                SOURCE_SMOKE_USER_EMAIL: "",
                SOURCE_SMOKE_USER_PASSWORD: "",
                SOURCE_CLI_AUDIT_TOKEN: "",
                SOURCE_RUNTIME_AUDIT_TOKEN: "",
              },
              shouldPass: true,
            },
          ];

          for (const testCase of cases) {
            const hostedEnv = resolveHostedGithubEnvironmentEnv(testCase.fixture);
            const resolved = resolveHostedEnvironment(
              testCase.environment,
              { ...testCase.fixture, ...hostedEnv },
              contract,
            );
            const errors = validateResolvedHostedEnvironment(
              resolved,
              testCase.profile,
            );

            if (testCase.shouldPass && errors.length > 0) {
              throw new Error(
                `${testCase.name} unexpectedly failed:\n${errors.join("\n")}`,
              );
            }

            if (!testCase.shouldPass) {
              if (errors.length === 0) {
                throw new Error(`${testCase.name} unexpectedly passed`);
              }
              if (
                testCase.expectedError &&
                !errors.includes(testCase.expectedError)
              ) {
                throw new Error(
                  `${testCase.name} failed, but not for the expected reason.\nExpected: ${testCase.expectedError}\nActual:\n${errors.join("\n")}`,
                );
              }
            }

            if (testCase.shouldPass) {
              const outputs = formatHostedEnvironmentForGithubOutputs(resolved);
              if (!outputs.agent_runtime_secret_names_csv.includes("SUPABASE_SERVICE_ROLE_KEY")) {
                throw new Error(`${testCase.name} is missing agent runtime secret outputs`);
              }
              if (!outputs.audit_required_runtime_keys_csv.includes("deviceAuthEnabled")) {
                throw new Error(`${testCase.name} is missing audit runtime key outputs`);
              }
            }
          }
          console.log("hosted export fixtures ok");
          NODE

  cli-core:
    name: cli-core
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.cli }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No CLI or CI changes; skipping CLI core checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - if: steps.gate.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "cli/uv.lock"

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.run == 'true'
        name: Install dependencies
        working-directory: cli
        run: uv sync

      - if: steps.gate.outputs.run == 'true'
        name: Run CLI core
        run: bash scripts/ci/core.sh cli

  ui-core:
    name: ui-core
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.ui }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No UI or CI changes; skipping UI core checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - if: steps.gate.outputs.run == 'true'
        name: Install dependencies
        working-directory: ui
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Verify lockfile is up to date
        working-directory: ui
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync. Run 'npm install' and commit the lockfile."
            exit 1
          }

      - if: steps.gate.outputs.run == 'true'
        name: Run UI core
        run: bash scripts/ci/core.sh ui

  server-core:
    name: server-core
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No server or CI changes; skipping server core checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "server/package-lock.json"

      - if: steps.gate.outputs.run == 'true'
        name: Install dependencies
        working-directory: server
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Verify lockfile is up to date
        working-directory: server
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync. Run 'npm install' and commit the lockfile."
            exit 1
          }

      - if: steps.gate.outputs.run == 'true'
        name: Run server core
        run: bash scripts/ci/core.sh server

  legacy-provider-guard:
    name: legacy-provider-guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fail on stale legacy-provider references in active first-party paths
        run: bash scripts/ci/core.sh guard

  hosted-preflight:
    name: hosted-preflight
    runs-on: ubuntu-latest
    needs: [changes]
    environment: staging

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.ui }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No UI or CI changes; skipping hosted preflight."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - if: steps.gate.outputs.run == 'true'
        name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Install server dependencies
        working-directory: server
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Run hosted preflight
        env:
          SONDE_HOSTED_PREFLIGHT_AGENT_HTTP_BASE: ${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          SONDE_HOSTED_PREFLIGHT_APP_ORIGIN: ${{ vars.SONDE_STAGING_UI_URL }}
          SONDE_HOSTED_PREFLIGHT_REQUIRED: "1"
        run: bash scripts/ci/hosted-preflight.sh

  browser-regression:
    name: browser-regression
    runs-on: ubuntu-latest
    needs: [changes, ui-core, server-core, hosted-preflight]
    env:
      VITE_SUPABASE_URL: https://utvmqjssbkzpumsdpgdy.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_tWTyul-LMC9QDFYID8pOZA_wKM2e2AL
      E2E_AUTH_BYPASS_TOKEN: playwright-smoke-token
      VITE_AGENT_PROXY_TARGET: http://127.0.0.1:3004
      VITE_AGENT_WS_URL: ws://127.0.0.1:3004

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.ui }}" == "true" || "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No UI, server, or CI changes; skipping browser regression."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - if: steps.gate.outputs.run == 'true'
        name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Install server dependencies
        working-directory: server
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Run browser regression
        run: bash scripts/ci/browser.sh regression

      - if: failure() && steps.gate.outputs.run == 'true'
        name: Upload regression report on failure
        uses: actions/upload-artifact@v7
        with:
          name: playwright-regression-report
          path: ui/playwright-report/

  browser-smoke:
    name: browser-smoke
    runs-on: ubuntu-latest
    needs: [changes, ui-core, server-core, browser-regression]
    env:
      VITE_SUPABASE_URL: https://utvmqjssbkzpumsdpgdy.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_tWTyul-LMC9QDFYID8pOZA_wKM2e2AL
      E2E_AUTH_BYPASS_TOKEN: playwright-smoke-token
      VITE_AGENT_PROXY_TARGET: http://127.0.0.1:3004
      VITE_AGENT_WS_URL: ws://127.0.0.1:3004

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.ui }}" == "true" || "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No UI, server, or CI changes; skipping browser smoke."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - if: steps.gate.outputs.run == 'true'
        name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Install server dependencies
        working-directory: server
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Run browser smoke
        run: bash scripts/ci/browser.sh smoke

      - if: failure() && steps.gate.outputs.run == 'true'
        name: Upload report on failure
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            ui/playwright-report/
            /tmp/sonde-agent-smoke.log

  managed-auth-parity:
    name: managed-auth-parity
    runs-on: ubuntu-latest
    needs: [changes, cli-core, server-core]

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.cli }}" == "true" || "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.data }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No CLI, server, data, or CI changes; skipping managed auth parity."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            ui/package-lock.json

      - if: steps.gate.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "cli/uv.lock"

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.run == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - if: steps.gate.outputs.run == 'true'
        name: Install server dependencies
        working-directory: server
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Run managed auth parity
        run: bash scripts/ci/auth.sh

  data-integration:
    name: data-integration
    runs-on: ubuntu-latest
    needs: [changes, cli-core]

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.cli }}" == "true" || "${{ needs.changes.outputs.data }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No CLI, data, or CI changes; skipping data integration."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - if: steps.gate.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "cli/uv.lock"

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.run == 'true'
        name: Run data integration
        run: bash scripts/ci/data.sh
