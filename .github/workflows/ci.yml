name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "cli/**"
      - "ui/**"
      - "server/**"
      - "supabase/migrations/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "ui/**"
      - "server/**"
      - "supabase/migrations/**"
      - ".github/workflows/ci.yml"

# ── CLI ────────────────────────────────────────────────────────────

jobs:
  cli-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Unit tests
        run: uv run pytest -m "not integration" --tb=short

# ── UI ─────────────────────────────────────────────────────────────

  ui-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

      - name: Tests
        run: npm run test
        continue-on-error: true  # UI tests may not exist yet

# ── Server ─────────────────────────────────────────────────────────

  server-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

# ── Schema integration (CLI + local Supabase) ─────────────────────

  schema-integration:
    runs-on: ubuntu-latest
    needs: cli-lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply all migrations from scratch
        run: supabase db reset --local --yes

      - name: Capture local credentials
        id: sb
        run: |
          echo "url=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - name: Smoke test — schema version RPC exists
        env:
          SB_URL: ${{ steps.sb.outputs.url }}
          SB_KEY: ${{ steps.sb.outputs.anon_key }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/rpc/get_schema_version")
          echo "Schema version: $VERSION"
          test "$VERSION" -ge 1

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI
        working-directory: cli
        run: uv sync

      - name: Verify migration count matches applied
        run: |
          FILE_COUNT=$(ls -1 supabase/migrations/*.sql | wc -l | tr -d ' ')
          APPLIED_COUNT=$(supabase db execute --local \
            "SELECT count(*) FROM supabase_migrations.schema_migrations" \
            --csv 2>/dev/null | tail -1 | tr -d ' ')
          echo "Migration files: $FILE_COUNT, Applied: $APPLIED_COUNT"
          if [ "$FILE_COUNT" != "$APPLIED_COUNT" ]; then
            echo "::error::Migration count mismatch: $FILE_COUNT files but $APPLIED_COUNT applied"
            exit 1
          fi

      - name: Integration tests against local Supabase
        working-directory: cli
        env:
          AEOLUS_SUPABASE_URL: ${{ steps.sb.outputs.url }}
          AEOLUS_SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon_key }}
          AEOLUS_SUPABASE_SERVICE_ROLE_KEY: ${{ steps.sb.outputs.service_role_key }}
        run: uv run pytest -m integration --tb=short

      - name: Stop Supabase
        if: always()
        run: supabase stop
