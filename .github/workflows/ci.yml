name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      ui: ${{ steps.filter.outputs.ui }}
      server: ${{ steps.filter.outputs.server }}
      data: ${{ steps.filter.outputs.data }}
      infra: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cli:
              - "cli/**"
            ui:
              - "ui/**"
            server:
              - "server/**"
            data:
              - "supabase/**"
            infra:
              - ".github/workflows/**"
              - "vercel.json"
              - "ui/vercel.json"

  cli-core:
    name: cli-core
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: cli

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.cli }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No CLI or CI changes; skipping CLI core checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "cli/uv.lock"

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.run == 'true'
        name: Install dependencies
        run: uv sync

      - if: steps.gate.outputs.run == 'true'
        name: Verify lockfile is up to date
        run: uv lock --check

      - if: steps.gate.outputs.run == 'true'
        name: Lint
        run: uv run ruff check src/ tests/

      - if: steps.gate.outputs.run == 'true'
        name: Format check
        run: uv run ruff format --check src/ tests/

      - if: steps.gate.outputs.run == 'true'
        name: Type check
        run: uv run ty check src/

      - if: steps.gate.outputs.run == 'true'
        name: Unit tests
        run: uv run pytest -m "not integration" --tb=short

  ui-core:
    name: ui-core
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: ui

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.ui }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No UI or CI changes; skipping UI core checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - if: steps.gate.outputs.run == 'true'
        name: Install dependencies
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Verify lockfile is up to date
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync. Run 'npm install' and commit the lockfile."
            exit 1
          }

      - if: steps.gate.outputs.run == 'true'
        name: Lint
        run: npm run lint

      - if: steps.gate.outputs.run == 'true'
        name: Build
        run: npm run build

      - if: steps.gate.outputs.run == 'true'
        name: Unit tests
        run: npm run test

  server-core:
    name: server-core
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: server

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No server or CI changes; skipping server core checks."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "server/package-lock.json"

      - if: steps.gate.outputs.run == 'true'
        name: Install dependencies
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Verify lockfile is up to date
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync. Run 'npm install' and commit the lockfile."
            exit 1
          }

      - if: steps.gate.outputs.run == 'true'
        name: Type check
        run: npm run lint

      - if: steps.gate.outputs.run == 'true'
        name: Tests
        run: npm test

      - if: steps.gate.outputs.run == 'true'
        name: Build
        run: npm run build

  browser-smoke:
    name: browser-smoke
    runs-on: ubuntu-latest
    needs: [changes, ui-core, server-core]
    defaults:
      run:
        working-directory: ui
    env:
      VITE_SUPABASE_URL: https://utvmqjssbkzpumsdpgdy.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_tWTyul-LMC9QDFYID8pOZA_wKM2e2AL
      E2E_AUTH_BYPASS_TOKEN: playwright-smoke-token

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.ui }}" == "true" || "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No UI, server, or CI changes; skipping browser smoke."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - if: steps.gate.outputs.run == 'true'
        name: Install UI dependencies
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Install server dependencies
        working-directory: server
        run: npm ci

      - if: steps.gate.outputs.run == 'true'
        name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - if: steps.gate.outputs.run == 'true'
        name: Start mock agent server
        working-directory: server
        env:
          NODE_ENV: test
          SONDE_AGENT_BACKEND: direct
          SONDE_SERVER_PORT: "3004"
          SONDE_SKIP_CLI_PROBE: "1"
          SONDE_TEST_AGENT_MOCK: "1"
          SONDE_TEST_AUTH_DELAY_MS: "100"
          SONDE_TEST_AUTH_BYPASS_TOKEN: ${{ env.E2E_AUTH_BYPASS_TOKEN }}
        run: |
          npx tsx src/index.ts >/tmp/sonde-agent-smoke.log 2>&1 &
          echo $! >/tmp/sonde-agent-smoke.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3004/health >/dev/null; then
              echo "Mock agent server is reachable"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Mock agent server did not become reachable in time"
          cat /tmp/sonde-agent-smoke.log || true
          exit 1

      - if: steps.gate.outputs.run == 'true'
        name: Direct agent chat smoke
        working-directory: server
        env:
          CHAT_SMOKE_HTTP_BASE: http://127.0.0.1:3004
          CHAT_SMOKE_TOKEN: ${{ env.E2E_AUTH_BYPASS_TOKEN }}
          CHAT_SMOKE_STALE_SESSION: "1"
          CHAT_SMOKE_TIMEOUT_MS: "30000"
        run: node scripts/chat-smoke.mjs

      - if: steps.gate.outputs.run == 'true'
        name: Run browser smoke
        run: npx playwright test e2e/ci-smoke.spec.ts --project=chromium --project=firefox

      - if: failure() && steps.gate.outputs.run == 'true'
        name: Upload report on failure
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            ui/playwright-report/
            /tmp/sonde-agent-smoke.log

      - if: always() && steps.gate.outputs.run == 'true'
        name: Stop mock agent server
        run: |
          if [ -f /tmp/sonde-agent-smoke.pid ]; then
            kill "$(cat /tmp/sonde-agent-smoke.pid)" || true
          fi

  data-integration:
    name: data-integration
    runs-on: ubuntu-latest
    needs: [changes, cli-core]

    steps:
      - id: gate
        run: |
          if [[ "${{ needs.changes.outputs.cli }}" == "true" || "${{ needs.changes.outputs.data }}" == "true" || "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.run != 'true'
        run: echo "No CLI, data, or CI changes; skipping data integration."

      - if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - if: steps.gate.outputs.run == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - if: steps.gate.outputs.run == 'true'
        name: Start local Supabase
        run: supabase start

      - if: steps.gate.outputs.run == 'true'
        name: Apply all migrations from scratch
        run: supabase db reset --local --yes

      - if: steps.gate.outputs.run == 'true'
        name: Capture local credentials
        id: sb
        run: |
          echo "url=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - if: steps.gate.outputs.run == 'true'
        name: Smoke test — schema version RPC exists
        env:
          SB_URL: ${{ steps.sb.outputs.url }}
          SB_KEY: ${{ steps.sb.outputs.anon_key }}
        run: |
          VERSION=$(curl -sf \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/rpc/get_schema_version")
          echo "Schema version: $VERSION"
          test "$VERSION" -ge 1

      - if: steps.gate.outputs.run == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "cli/uv.lock"

      - if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - if: steps.gate.outputs.run == 'true'
        name: Install CLI
        working-directory: cli
        run: uv sync

      - if: steps.gate.outputs.run == 'true'
        name: Verify migration count matches applied
        run: |
          FILE_COUNT=$(ls -1 supabase/migrations/*.sql | wc -l | tr -d ' ')
          APPLIED_COUNT=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -tAc \
            "SELECT count(*) FROM supabase_migrations.schema_migrations")
          echo "Migration files: $FILE_COUNT, Applied: $APPLIED_COUNT"
          if [ "$FILE_COUNT" != "$APPLIED_COUNT" ]; then
            echo "::error::Migration count mismatch: $FILE_COUNT files but $APPLIED_COUNT applied"
            exit 1
          fi

      - if: steps.gate.outputs.run == 'true'
        name: Integration tests against local Supabase
        working-directory: cli
        env:
          AEOLUS_SUPABASE_URL: ${{ steps.sb.outputs.url }}
          AEOLUS_SUPABASE_ANON_KEY: ${{ steps.sb.outputs.anon_key }}
          AEOLUS_SUPABASE_SERVICE_ROLE_KEY: ${{ steps.sb.outputs.service_role_key }}
        run: uv run pytest -m integration --tb=short

      - if: always() && steps.gate.outputs.run == 'true'
        name: Stop Supabase
        run: supabase stop
