name: Tag on Promote

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tag-on-promote
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      # Fail fast if the promotion token is missing. Without it, actions/checkout
      # falls back to the default GITHUB_TOKEN and the pushed tag will NOT trigger
      # the Release workflow (GitHub skips workflow chaining for default-token pushes).
      - name: Require promotion token
        env:
          PROMOTION_GITHUB_TOKEN: ${{ secrets.SONDE_PROMOTION_GITHUB_TOKEN }}
        run: |
          if [ -z "${PROMOTION_GITHUB_TOKEN}" ]; then
            echo "::error title=Missing SONDE_PROMOTION_GITHUB_TOKEN::Auto-tag requires a fine-grained GitHub token with Contents: Read and write so the tag push can trigger the Release workflow. Add it as a repo secret."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need all tags to compute the next patch
          # Use the promotion token so the pushed tag triggers the Release workflow
          # (the default GITHUB_TOKEN cannot trigger other workflows).
          token: ${{ secrets.SONDE_PROMOTION_GITHUB_TOKEN }}

      - name: Skip non-promote pushes
        id: gate
        run: |
          set -euo pipefail
          SUBJECT=$(git log -1 --pretty=%s)
          echo "Commit subject: ${SUBJECT}"
          # promote-main.yml opens PRs titled "Promote staging to main" and enables
          # auto-merge with mergeMethod: MERGE. GitHub's default merge-commit subject
          # is: "Merge pull request #NNN from <owner>/staging".
          #
          # Matches:     "Merge pull request #142 from aeolus-earth/staging"
          # Non-matches: any squash-merge subject, a rebase-merge subject,
          #              any PR from a branch other than "staging",
          #              manually edited merge titles.
          #
          # If promote-main.yml ever switches to squash/rebase merges, update this
          # regex or move the gate to a workflow_run trigger on "Promote Main".
          if echo "${SUBJECT}" | grep -qE "^Merge pull request #[0-9]+ from [^ ]+/staging$"; then
            echo "promote=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not a staging-promote merge commit — skipping tag."
            echo "promote=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next patch tag
        if: steps.gate.outputs.promote == 'true'
        id: next
        run: |
          set -euo pipefail
          # Policy: this repo ships stable vN.N.N tags only. Filter out any
          # non-semver tags so a stray manual tag can't crash the arithmetic
          # or skew the next-patch calculation.
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "${LAST_TAG}" ]; then
            NEXT="v0.1.0"
          else
            STRIPPED="${LAST_TAG#v}"
            MAJOR=$(echo "${STRIPPED}" | cut -d. -f1)
            MINOR=$(echo "${STRIPPED}" | cut -d. -f2)
            PATCH=$(echo "${STRIPPED}" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "Last tag: ${LAST_TAG:-<none>} -> next: ${NEXT}"
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.gate.outputs.promote == 'true'
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Auto-release ${TAG} from staging promotion"
          git push origin "${TAG}"
          echo "Pushed ${TAG} — Release workflow will run on the tag-push trigger."
