name: Staging Smoke

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to test (leave blank for staging default)"
        required: false
        type: string
      agent_url:
        description: "Agent base URL to smoke (leave blank for staging default)"
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium firefox --with-deps

      - name: Resolve target URLs
        id: url
        run: |
          URL="${{ inputs.url || vars.SONDE_STAGING_UI_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::No URL to test. Set SONDE_STAGING_UI_URL in repo variables or pass a URL via workflow dispatch."
            exit 1
          fi
          echo "target=$URL" >> "$GITHUB_OUTPUT"
          echo "Smoke testing: $URL"

      - name: Wait for staging UI
        run: |
          URL="${{ steps.url.outputs.target }}"
          for attempt in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Staging UI is reachable ($STATUS)"
              exit 0
            fi
            echo "Waiting for staging UI ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging UI did not become reachable in time"
          exit 1

      - name: Wait for staging agent
        if: ${{ inputs.agent_url != '' || vars.SONDE_STAGING_AGENT_HTTP_BASE != '' }}
        run: |
          AGENT="${{ inputs.agent_url || vars.SONDE_STAGING_AGENT_HTTP_BASE }}"
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENT/health" >/dev/null; then
              echo "Staging agent is reachable"
              exit 0
            fi
            echo "Waiting for staging agent ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging agent did not become reachable in time"
          exit 1

      - name: Run staging smoke tests
        env:
          E2E_BASE_URL: ${{ steps.url.outputs.target }}
          E2E_AGENT_HTTP_BASE: ${{ inputs.agent_url || vars.SONDE_STAGING_AGENT_HTTP_BASE }}
        run: npx playwright test e2e/deployed.spec.ts --project=chromium --project=firefox --reporter=github

      - name: Run staging agent chat smoke
        if: ${{ (inputs.agent_url != '' || vars.SONDE_STAGING_AGENT_HTTP_BASE != '') && secrets.SONDE_STAGING_AGENT_CHAT_TOKEN != '' }}
        working-directory: server
        env:
          CHAT_SMOKE_HTTP_BASE: ${{ inputs.agent_url || vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          CHAT_SMOKE_TOKEN: ${{ secrets.SONDE_STAGING_AGENT_CHAT_TOKEN }}
          CHAT_SMOKE_PROMPT: "Say hello briefly."
          CHAT_SMOKE_TIMEOUT_MS: "60000"
        run: node scripts/chat-smoke.mjs

      - name: Upload report on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: staging-smoke-report
          path: ui/playwright-report/
