name: Staging Smoke

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      url:
        description: "URL to test (leave blank for staging default)"
        required: false
        type: string
      agent_url:
        description: "Agent base URL to smoke (leave blank for staging default)"
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      STAGING_SMOKE_SESSION_FILE: ${{ runner.temp }}/sonde-staging-smoke-session.json
      STAGING_SMOKE_INPUT_URL: ${{ github.event.inputs.url || '' }}
      STAGING_SMOKE_INPUT_AGENT_URL: ${{ github.event.inputs.agent_url || '' }}
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            ui/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium firefox --with-deps

      - name: Resolve target URLs
        id: url
        run: |
          URL="${STAGING_SMOKE_INPUT_URL:-${{ vars.SONDE_STAGING_UI_URL }}}"
          if [ -z "$URL" ]; then
            echo "::error::No URL to test. Set SONDE_STAGING_UI_URL in repo variables or pass a URL via workflow dispatch."
            exit 1
          fi
          echo "target=$URL" >> "$GITHUB_OUTPUT"
          echo "Smoke testing: $URL"

      - name: Resolve staging schema version
        id: schema
        if: ${{ vars.SUPABASE_STAGING_PROJECT_REF != '' && vars.SUPABASE_STAGING_ANON_KEY != '' }}
        run: |
          if VERSION=$(curl -sf \
            -H "apikey: ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_STAGING_ANON_KEY }}" \
            "https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co/rest/v1/rpc/get_schema_version" | tr -d '"'); then
            :
          else
            echo "::notice::Falling back to unknown schema version because staging publishable-key RPC verification is unavailable"
            VERSION="unknown"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for staging UI
        run: |
          URL="${{ steps.url.outputs.target }}"
          for attempt in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Staging UI is reachable ($STATUS)"
              exit 0
            fi
            echo "Waiting for staging UI ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging UI did not become reachable in time"
          exit 1

      - name: Wait for staging agent
        if: ${{ env.STAGING_SMOKE_INPUT_AGENT_URL != '' || vars.SONDE_STAGING_AGENT_HTTP_BASE != '' }}
        run: |
          AGENT="${STAGING_SMOKE_INPUT_AGENT_URL:-${{ vars.SONDE_STAGING_AGENT_HTTP_BASE }}}"
          for attempt in $(seq 1 60); do
            if curl -fsS "$AGENT/health" >/dev/null; then
              echo "Staging agent is reachable"
              exit 0
            fi
            echo "Waiting for staging agent ($attempt/60)..."
            sleep 10
          done
          echo "::error::Staging agent did not become reachable in time"
          exit 1

      - name: Mint staging smoke session
        working-directory: server
        env:
          SUPABASE_URL: https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_STAGING_ANON_KEY }}
          SMOKE_USER_EMAIL: ${{ secrets.SONDE_STAGING_SMOKE_USER_EMAIL }}
          SMOKE_USER_PASSWORD: ${{ secrets.SONDE_STAGING_SMOKE_USER_PASSWORD }}
          SMOKE_SESSION_FILE: ${{ env.STAGING_SMOKE_SESSION_FILE }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SMOKE_USER_EMAIL" ] || [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::notice::Skipping staging smoke session mint because staging auth inputs are not fully configured"
            exit 0
          fi
          node scripts/mint-smoke-session.mjs >/dev/null

      - name: Audit deployed staging stack
        if: ${{ env.STAGING_SMOKE_INPUT_AGENT_URL != '' || vars.SONDE_STAGING_AGENT_HTTP_BASE != '' }}
        working-directory: server
        env:
          AUDIT_UI_BASE: ${{ steps.url.outputs.target }}
          AUDIT_AGENT_BASE: ${{ env.STAGING_SMOKE_INPUT_AGENT_URL || vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          AUDIT_RUNTIME_TOKEN: ${{ secrets.SONDE_STAGING_AGENT_RUNTIME_AUDIT_TOKEN }}
          AUDIT_EXPECT_ENVIRONMENT: staging
          AUDIT_EXPECT_COMMIT_SHA: ${{ github.sha }}
          AUDIT_EXPECT_SCHEMA_VERSION: ${{ steps.schema.outputs.version }}
          AUDIT_EXPECT_SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
        run: node scripts/audit-deployed-stack.mjs

      - name: Run staging smoke tests
        env:
          E2E_BASE_URL: ${{ steps.url.outputs.target }}
          E2E_AGENT_HTTP_BASE: ${{ env.STAGING_SMOKE_INPUT_AGENT_URL || vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          E2E_AGENT_RUNTIME_AUDIT_TOKEN: ${{ secrets.SONDE_STAGING_AGENT_RUNTIME_AUDIT_TOKEN }}
          E2E_SUPABASE_URL: https://${{ vars.SUPABASE_STAGING_PROJECT_REF }}.supabase.co
          E2E_EXPECT_PROGRAM_ID: shared
          E2E_EXPECT_EXPERIMENT_ID: EXP-9001
          E2E_EXPECT_TIMELINE_AUTH_MODE: server token
          E2E_CHAT_PROMPT: "Use Sonde tools to list one accessible program id, then reply with SONDE_SMOKE_OK."
          E2E_CHAT_EXPECT_SUBSTRING: SONDE_SMOKE_OK
          STAGING_SMOKE_SESSION_FILE: ${{ env.STAGING_SMOKE_SESSION_FILE }}
        run: |
          if [ -f "$STAGING_SMOKE_SESSION_FILE" ]; then
            export E2E_AUTH_SESSION_JSON="$(cat "$STAGING_SMOKE_SESSION_FILE")"
          fi
          npx playwright test e2e/deployed.spec.ts --project=chromium --project=firefox --reporter=github

      - name: Run staging agent chat smoke
        if: ${{ env.STAGING_SMOKE_INPUT_AGENT_URL != '' || vars.SONDE_STAGING_AGENT_HTTP_BASE != '' }}
        working-directory: server
        env:
          CHAT_SMOKE_HTTP_BASE: ${{ env.STAGING_SMOKE_INPUT_AGENT_URL || vars.SONDE_STAGING_AGENT_HTTP_BASE }}
          CHAT_SMOKE_PROMPT: "Use Sonde tools to list one accessible program id, then reply with SONDE_SMOKE_OK."
          CHAT_SMOKE_STALE_SESSION: "1"
          CHAT_SMOKE_REQUIRE_TOOL_USE: "1"
          CHAT_SMOKE_EXPECT_SUBSTRING: "SONDE_SMOKE_OK"
          CHAT_SMOKE_TIMEOUT_MS: "60000"
          STAGING_SMOKE_SESSION_FILE: ${{ env.STAGING_SMOKE_SESSION_FILE }}
          FALLBACK_CHAT_SMOKE_TOKEN: ${{ secrets.SONDE_STAGING_AGENT_CHAT_TOKEN }}
        run: |
          if [ -f "$STAGING_SMOKE_SESSION_FILE" ]; then
            export CHAT_SMOKE_TOKEN="$(node -e 'const fs=require(\"node:fs\"); const data=JSON.parse(fs.readFileSync(process.env.STAGING_SMOKE_SESSION_FILE,\"utf8\")); process.stdout.write((data.access_token ?? \"\").trim());')"
          fi
          if [ -z "$CHAT_SMOKE_TOKEN" ]; then
            export CHAT_SMOKE_TOKEN="$FALLBACK_CHAT_SMOKE_TOKEN"
          fi
          if [ -z "$CHAT_SMOKE_TOKEN" ]; then
            echo "::notice::Skipping staging agent chat smoke because no session token or SONDE_STAGING_AGENT_CHAT_TOKEN is configured"
            exit 0
          fi
          node scripts/chat-smoke.mjs

      - name: Upload report on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: staging-smoke-report
          path: ui/playwright-report/
