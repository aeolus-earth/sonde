version: 2
updates:
  # UI (Vite + React SPA)
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      ui-minor-patch:
        update-types:
          - "minor"
          - "patch"
      ui-major:
        update-types:
          - "major"
    labels:
      - "dependencies"
      - "ui"

  # Server (Node.js agent)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      server-minor-patch:
        update-types:
          - "minor"
          - "patch"
      server-major:
        update-types:
          - "major"
    labels:
      - "dependencies"
      - "server"

  # CLI (Python / uv)
  - package-ecosystem: "pip"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      cli-all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "cli"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions-all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
